<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全國技藝競賽 機器人學即測即評</title>
    <style>
        :root {
            --bg: #f4f7f6; --card: #ffffff; --border: #cccccc; --text: #333333; --sub: #666666;
            --primary: #004080; --answered: rgba(0,64,128,0.1); --answered-text: #004080;
            --skipped: rgba(0,0,0,0.05); --skipped-text: #666666;
            --correct-bg: rgba(40,167,69,0.15); --correct: #155724;
            --wrong-bg: rgba(220,53,69,0.15); --wrong: #721c24; --hover: #e9ecef;
        }
        [data-theme="dark"] {
            --bg: #0a0a0a; --card: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.10);
            --text: #e0e0e0; --sub: rgba(255,255,255,0.35); --primary: #e2e8f0;
            --answered: rgba(200,200,200,0.18); --answered-text: #c8d6e5;
            --skipped: rgba(200,200,200,0.08); --skipped-text: #888;
            --correct-bg: rgba(40,167,69,0.18); --correct: #7ee8a2;
            --wrong-bg: rgba(220,53,69,0.18); --wrong: #f5a0a8; --hover: rgba(255,255,255,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 15px; display: flex; flex-direction: column; height: 100vh;
            background-color: var(--bg); color: var(--text); transition: background-color 0.3s, color 0.3s;
        }
        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 60%, #0a0a0a 100%);
            background-attachment: fixed;
        }
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 60%, #0a0a0a 100%);
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        #setup-screen .hero { text-align: center; margin-bottom: 36px; }
        #setup-screen .eyebrow { font-size: 0.85rem; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; margin-bottom: 12px; font-weight: 600; }
        #setup-screen .title { font-size: 2.8rem; font-weight: 900; margin-bottom: 10px; line-height: 1.2; letter-spacing: -0.02em; }
        #setup-screen .title .gray { color: #9ca3af; }
        #setup-screen .title .white { color: #ffffff; }
        #setup-screen .tagline { font-size: 0.95rem; color: rgba(255,255,255,0.35); margin-bottom: 14px; }
        #setup-screen .version {
            display: inline-block; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4);
            font-size: 0.75rem; padding: 3px 14px; border-radius: 20px; letter-spacing: 0.05em; font-weight: bold;
        }
        #setup-screen .card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 28px 32px; width: 100%; max-width: 520px;
            display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #setup-screen .field-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
        #setup-screen .row { display: flex; align-items: center; gap: 10px; width: 100%; }
        #setup-screen select, #setup-screen input[type=number] {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: #e0e0e0; padding: 11px 14px; border-radius: 8px; font-size: 1rem; font-weight: 600;
            outline: none; width: 100%; text-align: center;
        }
        #setup-screen select:focus, #setup-screen input[type=number]:focus { border-color: rgba(255,255,255,0.4); }
        #setup-screen select option { background: #1e1e1e; color: #e0e0e0; }
        #setup-screen input::placeholder { color: rgba(255,255,255,0.25); font-weight: 400; }
        #setup-screen .sep { color: rgba(255,255,255,0.35); white-space: nowrap; font-size: 0.95rem; font-weight: 600; }
        #setup-screen .btn-start {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background: rgba(255,255,255,0.15); color: #e0e0e0;
            font-size: 1.15rem; font-weight: 700; cursor: pointer; letter-spacing: 0.05em;
            transition: background 0.2s, transform 0.1s; margin-top: 5px;
        }
        #setup-screen .btn-start:hover { background: rgba(255,255,255,0.22); transform: translateY(-2px); }
        #setup-screen .hint { text-align: center; font-size: 0.82rem; color: rgba(255,255,255,0.25); }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
        h1 { font-size: 1.3rem; font-weight: 800; color: var(--primary); letter-spacing: -0.01em; }
        .header-controls { display: flex; align-items: center; gap: 8px; }
        .timer-box {
            background: #222; color: #ffc107; padding: 6px 14px; border-radius: 7px;
            font-family: 'Courier New', monospace; font-weight: 700; font-size: 1.05rem;
            border: 1px solid #111; text-align: center; min-width: 75px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.6);
        }
        .btn {
            padding: 7px 13px; border-radius: 7px; border: 1px solid var(--border);
            font-size: 0.85rem; font-weight: 700; cursor: pointer; color: #fff; transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .main { display: flex; gap: 13px; flex: 1; overflow: hidden; margin-top: 13px; }
        .left-panel {
            flex: 0 0 280px; background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px; display: flex; flex-direction: column; overflow: hidden;
        }
        .grid-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sub); text-align: center; margin-bottom: 12px; }
        .question-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 6px; overflow-y: auto; align-content: start; flex: 1; padding-right: 4px; }
        .grid-item {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 8px; padding: 9px 0; text-align: center; cursor: pointer;
            font-weight: 700; font-size: 0.9rem; position: relative;
            transition: transform 0.1s, background 0.15s; color: var(--text);
        }
        .grid-item:hover { transform: scale(1.07); background: var(--hover); }
        .grid-item.active { border-color: var(--primary); border-width: 2px; }
        .grid-item.answered { background: var(--answered); color: var(--answered-text); }
        .grid-item.skipped { background: var(--skipped); color: var(--skipped-text); }
        .grid-item.panel-correct { background: var(--correct-bg); color: var(--correct); border-color: var(--correct); }
        .grid-item.panel-wrong { background: var(--wrong-bg); color: var(--wrong); border-color: var(--wrong); }
        .grid-item.panel-unanswered { background: var(--skipped); color: var(--sub); border-color: var(--border); }
        .bookmark-star { position: absolute; top: 2px; right: 3px; color: #ffc107; font-size: 0.6rem; display: none; line-height: 1; pointer-events: none; }
        .grid-item.bookmarked .bookmark-star { display: block; }
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--primary);
            padding: 11px 16px; border-radius: 10px; font-weight: 700; font-size: 1rem; color: var(--text);}
        .btn-reset { background: #444 !important; font-size: 0.82rem; padding: 6px 11px; }
        .btn-reset:hover { background: #8b1c1c !important; }
        .question-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 14px;
            padding: 26px 28px; display: flex; flex-direction: column; gap: 18px; flex: 1;
            box-shadow: 0 4px 32px rgba(0,0,0,0.5);
            --q-font: 1.13rem; --opt-font: 1rem;
        }
        .q-meta { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sub); }
        .q-text { font-size: var(--q-font); font-weight: 700; line-height: 1.75; color: var(--text); transition: font-size 0.2s; }
        .options { display: flex; flex-direction: column; gap: 8px; }
        .opt-label {
            display: flex; align-items: center; gap: 0;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 10px; cursor: pointer; overflow: hidden;
            transition: background 0.15s, transform 0.1s; position: relative;
        }
        .opt-label:hover { background: var(--hover); transform: translateX(3px); }
        .opt-letter {
            width: 44px; flex-shrink: 0; text-align: center; font-size: 0.82rem; font-weight: 800;
            color: var(--sub); padding: 14px 0; border-right: 1px solid var(--border); transition: color 0.15s;
        }
        .opt-body { padding: 14px 16px; font-size: var(--opt-font); line-height: 1.5; flex: 1; color: var(--text); font-weight: 600; transition: font-size 0.2s; }
        .opt-label input[type=radio] { display: none; }
        .opt-label:has(input:checked) { background: var(--answered); border-color: var(--primary); }
        .opt-label:has(input:checked)::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--primary); }
        .opt-label:has(input:checked) .opt-letter { color: var(--primary); border-right-color: var(--primary); }
        .opt-label.correct { background: var(--correct-bg) !important; border-color: #28a745 !important; }
        .opt-label.correct::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #28a745; }
        .opt-label.correct .opt-letter { color: var(--correct); border-right-color: var(--correct); }
        .opt-label.wrong { background: var(--wrong-bg) !important; border-color: #dc3545 !important; }
        .opt-label.wrong::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #dc3545; }
        .opt-label.wrong .opt-letter { color: var(--wrong); border-right-color: var(--wrong); }
        .result-box { display: none; padding: 13px 16px; border-radius: 10px; font-weight: 700; font-size: 1rem; }
        .correct-box { background: var(--correct-bg); color: var(--correct); border-left: 4px solid #28a745; }
        .wrong-box { background: var(--wrong-bg); color: var(--wrong); border-left: 4px solid #dc3545; }
        .action-bar { display: flex; gap: 10px; margin-top: auto; }
        .action-bar .btn { flex: 1; padding: 12px 0; font-size: 0.95rem; border-radius: 10px; border: none; }
        footer { text-align: center; font-size: 0.85rem; color: var(--sub); padding: 10px 0; font-weight: bold; }

        /* ===== 手機版隔離 ===== */
        @media (max-width: 768px) {
            body { padding: 10px; }
            #setup-screen .title { font-size: 2.2rem; }
            #setup-screen .card { padding: 24px 20px; gap: 16px; }
            #setup-screen .row { flex-wrap: wrap; }
            header { flex-direction: column; align-items: stretch; border-bottom: none; gap: 10px; }
            header h1 { text-align: center; font-size: 1.4rem; }

            /* 第一排：Timer 50%、A⁻ 25%、A⁺ 25% */
            /* 第二排：切換主題 25%、★書籤 25%、錯誤回報 25%、交卷計分 25% */
            .header-controls {
                display: grid;
                grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
                grid-template-rows: auto auto;
                gap: 8px;
                width: 100%;
            }
            .timer-box {
                grid-column: 1;
                grid-row: 1;
                width: 100%; padding: 10px; font-size: 1.1rem;}
            /* A⁻ */
            .header-controls .btn:nth-child(2) { grid-column: 2; grid-row: 1; }
            /* A⁺ */
            .header-controls .btn:nth-child(3) { grid-column: 3; grid-row: 1; }
            /* 切換主題 — 第二排第1格，但第一排只用了3格，用span補齊讓第二排從col1開始 */
            .header-controls .btn:nth-child(4) { grid-column: 1; grid-row: 2; }
            /* ★ 書籤 */
            .header-controls .btn:nth-child(5) { grid-column: 2; grid-row: 2; }
            /* 錯誤回報 */
            .header-controls .btn:nth-child(6) { grid-column: 3; grid-row: 2; }
            /* 交卷計分 */
            .header-controls .btn:nth-child(7) { grid-column: 4; grid-row: 2; }

            .header-controls .btn { padding: 10px 6px; font-size: 0.82rem; width: 100%; text-align: center; }

            .main { flex-direction: column; gap: 10px; }
            .left-panel { flex: none; width: 100%; height: 140px; padding: 12px; }
            .right-panel { padding: 0; gap: 10px; }
            .question-card { padding: 20px 18px; }
            .stats-bar { padding: 12px 15px; flex-direction: column; gap: 8px; align-items: stretch; text-align: center; }
            .btn-reset { font-size: 0.8rem !important; padding: 8px 12px !important; margin-top: 5px; }
            .opt-letter { width: 40px; }
            .opt-body { padding: 12px 15px; font-size: 1rem; }
        }
        /* ===== 手機版隔離結束 ===== */
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="hero">
        <p class="eyebrow">全國技藝競賽 / 機器人學</p>
        <h1 class="title"><span class="gray">即測即評</span><span class="white">備戰平台</span></h1>
        <p class="tagline">HCVS 選手專屬 · 邁向金手獎</p>
        <span class="version">Ver 6.9.258</span>
    </div>
    <div class="card">
        <div>
            <div class="field-label">抽取題數</div>
            <div class="row">
                <select id="quiz-num" style="flex:2;">
                    <option value="10">10 題</option>
                    <option value="30" selected>30 題</option>
                    <option value="50">50 題</option>
                    <option value="100">100 題</option>
                    <option value="all">範圍內全考</option>
                </select><span class="sep">或</span>
                <input type="number" id="custom-num" placeholder="自訂題數" style="flex:2;">
            </div>
        </div>
        <div>
            <div class="field-label">題庫範圍（留空 = 全部）</div>
            <div class="row">
                <span class="sep">第</span>
                <input type="number" id="range-start" placeholder="1" min="1" style="flex:1;">
                <span class="sep">題 到第</span>
                <input type="number" id="range-end" placeholder="258" min="1" style="flex:1;">
                <span class="sep">題</span>
            </div>
        </div>
        <button class="btn-start" onclick="startQuiz()">開始特訓</button>
        <p class="hint">作答進度與計時全自動儲存，重整網頁不遺失</p>
    </div>
</div>

<header>
    <h1>機器人學即測即評</h1>
    <div class="header-controls">
        <div class="timer-box" id="timer-display">00:00</div>
        <button class="btn" style="background:#333;" onclick="changeFontSize(-1)">A⁻</button>
        <button class="btn" style="background:#333;" onclick="changeFontSize(1)">A⁺</button>
        <button class="btn" style="background:#333;" onclick="toggleTheme()">切換主題</button>
        <button class="btn" style="background:#b07d10;" onclick="toggleBookmarkCurrent()">★ 書籤</button>
        <button class="btn" style="background:#8b1c1c;" onclick="reportError()">錯誤回報</button>
        <button class="btn" style="background:#155724;" onclick="submitQuiz()">交卷計分</button>
    </div>
</header>

<div class="main">
    <div class="left-panel">
        <div class="grid-title">答題概況</div>
        <div class="question-grid" id="number-grid"></div>
    </div>
    <div class="right-panel">
        <div class="stats-bar">
            <span id="stats-counter"></span>
            <button class="btn btn-reset" onclick="resetQuiz()">重新測驗</button>
        </div>
        <div class="question-card">
            <div class="q-meta" id="q-number">系統載入中...</div>
            <div class="q-text" id="q-text"></div>
            <div class="options" id="q-options"></div>
            <div class="result-box" id="feedback-box"></div>
            <div class="action-bar">
                <button class="btn" style="background:#333;" onclick="changeQuestion(currentIndex - 1)">← 上一題</button>
                <button class="btn" style="background:#333;" onclick="changeQuestion(currentIndex + 1)">下一題 →</button>
            </div>
        </div>
    </div>
</div>

<footer>HCVS 專屬備戰平台 · 邁向金手獎 &nbsp; Ver 6.9.258</footer>

<form action="https://docs.google.com/forms/d/e/1FAIpQLSdbhLE_5m2wHknapDS176N-V5RW3JJwZse8EMjo967Xtk0P0w/formResponse" method="post" target="hidden_iframe" id="gform" style="display:none;">
    <input type="text" name="entry.1177158450" id="entry_id">
    <input type="text" name="entry.1960243392" id="entry_reason">
</form>
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(window.submitted){alert('錯誤回報已自動送出至後台。感謝協助！');window.submitted=false;}"></iframe>

<script>
    // ===== 題庫放這裡 =====
    const questionBank = [
    ];

    // ===== 狀態 =====
    let quiz = [], userAnswers = [], bookmarks = [], submitted = false;
    let currentIndex = 0, timerInterval = null, elapsedSeconds = 0;
    let fontLevel = 0;
    const fontSizes = [
        { q: '1.13rem', opt: '1rem' },
        { q: '1.4rem',  opt: '1.2rem' },
        { q: '1.7rem',  opt: '1.45rem' }
    ];

    // ===== 字體大小 =====
    function changeFontSize(dir) {
        fontLevel = Math.max(0, Math.min(2, fontLevel + dir));
        const card = document.querySelector('.question-card');
        card.style.setProperty('--q-font', fontSizes[fontLevel].q);
        card.style.setProperty('--opt-font', fontSizes[fontLevel].opt);
    }

    // ===== 主題 =====
    function toggleTheme() {
        const html = document.documentElement;
        html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        localStorage.setItem('theme', html.getAttribute('data-theme'));
    }

    // ===== 計時器 =====
    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            elapsedSeconds++;
            localStorage.setItem('elapsed', elapsedSeconds);
            const m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
            const s = String(elapsedSeconds % 60).padStart(2, '0');
            document.getElementById('timer-display').textContent = `${m}:${s}`;
        }, 1000);
    }

    // ===== 開始測驗 =====
    function startQuiz() {
        const customVal = parseInt(document.getElementById('custom-num').value);
        const selectVal = document.getElementById('quiz-num').value;
        const rs = parseInt(document.getElementById('range-start').value);
        const re = parseInt(document.getElementById('range-end').value);

        let pool = [...questionBank];
        if (!isNaN(rs) && !isNaN(re)) pool = pool.filter((_, i) => (i + 1) >= rs && (i + 1) <= re);
        else if (!isNaN(rs)) pool = pool.filter((_, i) => (i + 1) >= rs);
        else if (!isNaN(re)) pool = pool.filter((_, i) => (i + 1) <= re);

        shuffle(pool);
        let n = selectVal === 'all' ? pool.length : (!isNaN(customVal) && customVal > 0 ? customVal : parseInt(selectVal));
        quiz = pool.slice(0, Math.min(n, pool.length));
        userAnswers = Array(quiz.length).fill(null);
        bookmarks = Array(quiz.length).fill(false);
        submitted = false;
        currentIndex = 0;
        elapsedSeconds = 0;

        saveState();
        document.getElementById('setup-screen').style.display = 'none';
        buildGrid();
        changeQuestion(0);
        startTimer();
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    // ===== 題目格網 =====
    function buildGrid() {
        const grid = document.getElementById('number-grid');
        grid.innerHTML = '';
        quiz.forEach((_, i) => {
            const el = document.createElement('div');
            el.className = 'grid-item';
            el.id = `grid-${i}`;
            el.textContent = i + 1;
            el.innerHTML += '<span class="bookmark-star">★</span>';
            el.onclick = () => changeQuestion(i);
            grid.appendChild(el);
        });
        updateGrid();
    }

    function updateGrid() {
        quiz.forEach((_, i) => {
            const el = document.getElementById(`grid-${i}`);
            if (!el) return;
            el.className = 'grid-item';
            if (submitted) {
                if (userAnswers[i] === null) el.classList.add('panel-unanswered');
                else if (userAnswers[i] === quiz[i].ans) el.classList.add('panel-correct');
                else el.classList.add('panel-wrong');
            } else {
                if (userAnswers[i] !== null) el.classList.add('answered');
            }
            if (i === currentIndex) el.classList.add('active');
            if (bookmarks[i]) el.classList.add('bookmarked');
        });
    }

    // ===== 渲染題目 =====
    function changeQuestion(idx) {
        if (idx < 0 || idx >= quiz.length) return;
        currentIndex = idx;
        const q = quiz[idx];
        document.getElementById('q-number').textContent = `題目 ${idx + 1} / ${quiz.length}`;
        document.getElementById('q-text').textContent = q.q;

        const optContainer = document.getElementById('q-options');
        optContainer.innerHTML = '';
        const letters = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, i) => {
            const label = document.createElement('label');
            label.className = 'opt-label';
            label.innerHTML = `
                <input type="radio" name="opt" value="${i}" ${userAnswers[idx] === i ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
                <span class="opt-letter">${letters[i]}</span>
                <span class="opt-body">${opt}</span>`;
            if (!submitted) {
                label.querySelector('input').addEventListener('change', () => {
                    userAnswers[idx] = i;
                    saveState();
                    updateGrid();updateStats();
                    showFeedback(idx);
                    // ===== 選題後自動跳下一題 =====
                    setTimeout(() => changeQuestion(idx + 1), 300);
                });
            }
            if (submitted) {
                if (i === q.ans) label.classList.add('correct');
                else if (i === userAnswers[idx] && userAnswers[idx] !== q.ans) label.classList.add('wrong');
            }
            optContainer.appendChild(label);
        });

        showFeedback(idx);
        updateGrid();
        updateStats();

        const el = document.getElementById(`grid-${idx}`);
        if (el) el.scrollIntoView({ block: 'nearest' });
    }

    function showFeedback(idx) {
        const box = document.getElementById('feedback-box');
        if (!submitted || userAnswers[idx] === null) { box.style.display = 'none'; return; }
        const correct = userAnswers[idx] === quiz[idx].ans;
        box.style.display = 'block';
        box.className = `result-box ${correct ? 'correct-box' : 'wrong-box'}`;
        box.textContent = correct ? '✓ 答對了！' : `✕ 答錯了，正確答案是 ${['A','B','C','D'][quiz[idx].ans]}`;
    }

    function updateStats() {
        const answered = userAnswers.filter(a => a !== null).length;
        document.getElementById('stats-counter').textContent =
            submitted? `已作答 ${answered} / ${quiz.length} 題`
            : `進度：${answered} / ${quiz.length} 題`;
    }

    // ===== 交卷 =====
    function submitQuiz() {
        if (!quiz.length) return;
        const unanswered = userAnswers.filter(a => a === null).length;
        if (unanswered > 0 && !confirm(`還有 ${unanswered} 題未作答，確定交卷？`)) return;
        submitted = true;
        clearInterval(timerInterval);
        const correct = userAnswers.filter((a, i) => a === quiz[i].ans).length;
        const total = quiz.length;
        const pct = Math.round(correct / total * 100);
        alert(`測驗結果\n答對：${correct} / ${total} 題（${pct}%）\n用時：${document.getElementById('timer-display').textContent}`);
        buildGrid();
        changeQuestion(currentIndex);
        saveState();
    }

    // ===== 書籤 =====
    function toggleBookmarkCurrent() {
        if (!quiz.length) return;
        bookmarks[currentIndex] = !bookmarks[currentIndex];
        saveState();
        updateGrid();
    }

    // ===== 重置 =====
    function resetQuiz() {
        if (!confirm('確定要重新測驗？目前進度將會清除。')) return;
        clearInterval(timerInterval);
        localStorage.removeItem('quizState');
        document.getElementById('setup-screen').style.display = 'flex';
        document.getElementById('q-number').textContent = '系統載入中...';
        document.getElementById('q-text').textContent = '';
        document.getElementById('q-options').innerHTML = '';
        document.getElementById('number-grid').innerHTML = '';
        document.getElementById('stats-counter').textContent = '';
        document.getElementById('timer-display').textContent = '00:00';
        quiz = []; userAnswers = []; bookmarks = []; submitted = false; elapsedSeconds = 0;}

    // ===== 錯誤回報 =====
    function reportError() {
        if (!quiz.length) return;
        const reason = prompt('請描述此題的錯誤（例如：答案有誤、題目不清）：');
        if (!reason) return;
        document.getElementById('entry_id').value = `題目${currentIndex + 1}：${quiz[currentIndex].q.substring(0, 30)}`;
        document.getElementById('entry_reason').value = reason;
        window.submitted = true;
        document.getElementById('gform').submit();
    }

    // ===== localStorage =====
    function saveState() {
        localStorage.setItem('quizState', JSON.stringify({ quiz, userAnswers, bookmarks, submitted, currentIndex, elapsedSeconds }));
    }

    function loadState() {
        const saved = localStorage.getItem('quizState');
        if (!saved) return false;
        try {
            const s = JSON.parse(saved);
            quiz = s.quiz; userAnswers = s.userAnswers; bookmarks = s.bookmarks;
            submitted = s.submitted; currentIndex = s.currentIndex; elapsedSeconds = s.elapsedSeconds || 0;
            return true;
        } catch { return false; }
    }

    // ===== 初始化 =====
    (function init() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

        if (loadState() && quiz.length) {
            document.getElementById('setup-screen').style.display = 'none';
            const m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
            const s = String(elapsedSeconds % 60).padStart(2, '0');
            document.getElementById('timer-display').textContent = `${m}:${s}`;
            buildGrid();
            changeQuestion(currentIndex);
            if (!submitted) startTimer();
        }
    })();
</script>
</body>
</html>
