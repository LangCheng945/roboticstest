<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機器人學模擬測驗</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --border: #e0e0e0;
            --text: #1a1a1a;
            --text-muted: #888;
            --primary: #1a1a1a;
            --accent: #f39c12;
            --correct: #22c55e;
            --wrong: #ef4444;
        }

        [data-theme="dark"] {
            --bg: #111;
            --surface: #1e1e1e;
            --border: #2e2e2e;
            --text: #f0f0f0;
            --text-muted: #666;
            --primary: #f0f0f0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        /* ── 首頁 ── */
        #setup-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background: linear-gradient(160deg, #0d1b2a 0%, #1a3a5c 100%);
        }

        .hero { text-align: center; margin-bottom: 48px; }

        .hero-label {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin-bottom: 16px;
        }

        .hero-title {
            font-size: 2.8rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .hero-title em {
            font-style: normal;
            color: var(--accent);
        }

        .hero-sub {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.35);
            margin-top: 12px;
        }

        .badge {
            display: inline-block;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.35);
            margin-top: 16px;
        }

        .setup-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            backdrop-filter: blur(12px);
        }

        .field-label {
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin-bottom: 8px;display: block;
        }

        .input-row { display: flex; gap: 8px; align-items: center; }

        .inp {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s;
            min-width: 0;
        }
        .inp:focus { border-color: var(--accent); }
        .inp option { background: #1a2a40; }
        .inp::placeholder { color: rgba(255,255,255,0.25); }

        .sep { font-size: 0.8rem; color: rgba(255,255,255,0.25); white-space: nowrap; }

        .btn-start {
            padding: 13px;
            background: linear-gradient(90deg, #f39c12, #e67e22);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            letter-spacing: 0.04em;
        }
        .btn-start:hover { opacity: 0.9; transform: translateY(-1px); }

        .setup-hint {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.2);
            text-align: center;
            margin-top: 12px;
        }

        /* ── 測驗頁 ── */
        #app { display: none; flex-direction: column; min-height: 100vh; }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
            gap: 12px;
        }

        .topbar-title {
            font-size: 0.95rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .topbar-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

        .timer {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            font-weight: 700;
            background: #1a1a1a;
            color: #ffc107;
            padding: 5px 12px;
            border-radius: 6px;
        }

        .tbtn {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .tbtn:hover { background: var(--bg); }
        .tbtn.danger { color: var(--wrong); border-color: var(--wrong); }
        .tbtn.success { color: var(--correct); border-color: var(--correct); }

        .content {
            display: flex;
            flex: 1;
            gap: 0;
        }

        /* 左側題號 */
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            padding: 20px 16px;
            overflow-y: auto;
            background: var(--surface);
        }

        .sidebar-title {
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .q-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
            gap: 6px;
        }

        .q-dot {
            height: 36px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: background 0.1s;
            position: relative;
        }
        .q-dot.active { border-color: var(--primary); color: var(--primary); border-width: 2px; }
        .q-dot.answered { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
        .q-dot.skipped { background: #fef9c3; color: #a16207; border-color: #fde047; }
        .q-dot.ok { background: #dcfce7; color: #15803d; border-color: #86efac; }
        .q-dot.fail { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
        .q-dot.bk::after {
            content: '';
            position: absolute;
            top: 3px; right: 3px;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
        }

        [data-theme="dark"] .q-dot.answered { background: #1e3a5f; color: #93c5fd; border-color: #1d4ed8; }
        [data-theme="dark"] .q-dot.skipped { background: #3a2e00; color: #fde047; border-color: #a16207; }
        [data-theme="dark"] .q-dot.ok { background: #14532d; color: #86efac; border-color: #15803d; }
        [data-theme="dark"] .q-dot.fail { background: #450a0a; color: #fca5a5; border-color: #b91c1c; }

        /* 主區 */
        .main {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            max-width: 720px;
        }

        .q-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 0.05em;
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .options { display: flex; flex-direction: column; gap: 10px; }

        .opt-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: border-color 0.15s, background 0.15s;
            background: var(--surface);
        }
        .opt-label:hover { border-color: var(--primary); }
        .opt-label input { accent-color: var(--primary); transform: scale(1.15); flex-shrink: 0; }

        .feedback {
            display: none;
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .feedback.ok { background: #dcfce7; color: #15803d; border-left: 4px solid var(--correct); }
        .feedback.fail { background: #fee2e2; color: #b91c1c; border-left: 4px solid var(--wrong); }
        [data-theme="dark"] .feedback.ok { background: #14532d; color: #86efac; }
        [data-theme="dark"] .feedback.fail { background: #450a0a; color: #fca5a5; }

        .nav-row {
            display: flex;
            gap: 10px;
            margin-top: 32px;
        }

        .nav-btn {
            flex: 1;
            padding: 11px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;}
        .nav-btn:hover { background: var(--bg); }

        .progress {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 680px) {
            .sidebar { display: none; }
            .main { padding: 20px 16px; }
            .topbar { padding: 12px 16px; }
            .topbar-title { font-size: 0.85rem; }
            .timer { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<!-- 首頁 -->
<div id="setup-screen">
    <div class="hero">
        <p class="hero-label">全國技藝競賽 / 機器人學</p>
        <h1 class="hero-title">即測即評<em>備戰平台</em></h1>
        <p class="hero-sub">HCVS 選手專屬 · 邁向金手獎</p>
        <span class="badge">Ver 6.6.158</span>
    </div>

    <div class="setup-card">
        <div>
            <span class="field-label">抽取題數</span>
            <div class="input-row">
                <select id="quiz-num" class="inp">
                    <option value="10">10 題</option>
                    <option value="30" selected>30 題</option>
                    <option value="50">50 題</option>
                    <option value="100">100 題</option>
                </select>
                <span class="sep">或</span>
                <input type="number" id="custom-num" class="inp" placeholder="自訂題數" min="1">
            </div>
        </div>
        <button class="btn-start" onclick="startQuiz()">開始特訓</button>
    </div>
    <p class="setup-hint">作答進度與計時自動儲存，重整不遺失</p>
</div>

<!-- 測驗頁 -->
<div id="app">
    <div class="topbar">
        <span class="topbar-title">機器人學即測即評</span>
        <div class="topbar-actions">
            <span class="timer" id="timer-display">00:00</span>
            <button class="tbtn" onclick="toggleTheme()">主題</button>
            <button class="tbtn" onclick="toggleBookmark()">書籤</button>
            <button class="tbtn danger" onclick="resetQuiz()">重置</button>
            <button class="tbtn success" onclick="submitQuiz()">交卷</button>
        </div>
    </div>

    <div class="content">
        <div class="sidebar">
            <div class="sidebar-title">答題概況</div>
            <div class="q-grid" id="q-grid"></div>
        </div>

        <div class="main">
            <div class="q-meta" id="q-meta"></div>
            <div class="q-text" id="q-text"></div>
            <div class="options" id="q-options"></div>
            <div class="feedback" id="feedback"></div>
            <div class="nav-row">
                <button class="nav-btn" onclick="go(currentIndex - 1)">上一題</button>
                <button class="nav-btn" onclick="go(currentIndex + 1)">下一題</button>
            </div>
            <div class="progress" id="progress"></div>
        </div>
    </div>
</div>

<script>
const questionBank = [
    { q: "1. 下列何者屬於並聯式機器人的典型應用？", options: ["(A) 汽車底盤焊接", "(B) 食品自動化整列", "(C) 手機外殼拋光", "(D) 大型板金噴漆"], ans: 1 },
    { q: "2. 機器人的自由度（DOF）指的是什麼？", options: ["(A) 最大承載重量", "(B) 可獨立運動的軸數", "(C) 最高移動速度", "(D) 電機額定功率"], ans: 1 },
    { q: "3. 伺服馬達相較於步進馬達的主要優點為何？", options: ["(A) 結構更簡單", "(B) 成本更低", "(C) 具備閉迴路回授控制", "(D) 不需要驅動器"], ans: 2 },
    { q: "4. PLC 中 Ladder Diagram 的中文名稱為？", options: ["(A) 流程圖", "(B) 階梯圖", "(C) 時序圖", "(D) 狀態圖"], ans: 1 },
    { q: "5. 關節式機器手臂最常見的軸數為？", options: ["(A) 3 軸", "(B) 4 軸", "(C) 6 軸", "(D) 8 軸"], ans: 2 },
    { q: "6. 下列哪種感測器最適合用於精確量測距離？", options: ["(A) 熱電偶", "(B) 光電感測器", "(C) 雷射測距感測器", "(D) 壓力感測器"], ans: 2 },
    { q: "7. 工業機器人中 TCP 代表什麼？", options: ["(A) 工具中心點", "(B) 傳輸控制協定", "(C) 扭力控制參數", "(D) 目標座標位置"], ans: 0 },
    { q: "8. 直流無刷馬達（BLDC）與有刷馬達相比，主要優點為？", options: ["(A) 啟動扭力較小", "(B) 不需電子控制器", "(C) 壽命長且維護少", "(D) 結構更複雜"], ans: 2 },
];

let quizSet = [], currentIndex = 0, answers = {}, skips = {}, bookmarks = {}, submitted = false, seconds = 0, timer = null;

const LS = {
    save: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
    load: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
    del: (...keys) => keys.forEach(k => localStorage.removeItem(k))
};

window.onload = () => {
    if (localStorage.getItem('hcvs_theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    if (localStorage.getItem('hcvs_active') === 'true') {
        quizSet = LS.load('hcvs_set', []);
        answers = LS.load('hcvs_ans', {});
        skips = LS.load('hcvs_skips', {});
        bookmarks = LS.load('hcvs_bk', {});
        currentIndex = LS.load('hcvs_idx', 0);
        seconds = LS.load('hcvs_secs', 0);
        submitted = localStorage.getItem('hcvs_submitted') === 'true';
        show('app');
        renderGrid(); showQ(currentIndex); updateProgress(); updateTimer();
        if (!submitted) startTimer();
    }
};

function startQuiz() {
    const custom = document.getElementById('custom-num').value;
    let n = custom ? parseInt(custom) : parseInt(document.getElementById('quiz-num').value);
    n = Math.min(n || 10, questionBank.length);
    quizSet = [...questionBank].sort(() => Math.random() - 0.5).slice(0, n);
    answers = {}; skips = {}; bookmarks = {}; submitted = false; seconds = 0;
    LS.save('hcvs_set', quizSet); LS.save('hcvs_ans', answers);LS.save('hcvs_skips', skips); LS.save('hcvs_bk', bookmarks);
    localStorage.setItem('hcvs_active', 'true');
    localStorage.removeItem('hcvs_submitted');
    show('app'); currentIndex = 0;
    renderGrid(); showQ(0); updateProgress(); startTimer();
}

function show(id) {
    document.getElementById('setup-screen').style.display = id === 'app' ? 'none' : 'flex';
    document.getElementById('app').style.display = id === 'app' ? 'flex' : 'none';
    if (id === 'app') document.getElementById('app').style.flexDirection = 'column';
}

function startTimer() {
    clearInterval(timer);
    timer = setInterval(() => { seconds++; LS.save('hcvs_secs', seconds); updateTimer(); }, 1000);
}

function updateTimer() {
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('timer-display').textContent = `${m}:${s}`;
}

function renderGrid() {
    const grid = document.getElementById('q-grid');
    grid.innerHTML = quizSet.map((_, i) => `<div class="q-dot" id="dot-${i}" onclick="go(${i})">${i+1}</div>`).join('');updateDots();
}

function updateDots() {
    quizSet.forEach((q, i) => {
        const d = document.getElementById(`dot-${i}`);
        if (!d) return;
        d.className = 'q-dot';
        if (i === currentIndex) d.classList.add('active');
        if (bookmarks[i]) d.classList.add('bk');
        if (submitted) {
            d.classList.add(answers[i] === q.ans ? 'ok' : 'fail');
        } else if (answers[i] !== undefined) {
            d.classList.add('answered');
        } else if (skips[i]) {
            d.classList.add('skipped');
        }
    });
}

function showQ(index) {
    currentIndex = index;
    LS.save('hcvs_idx', index);
    const q = quizSet[index];
    const id = q.q.match(/^\d+/)[0];
    document.getElementById('q-meta').textContent = `第 ${index+1} 題 / 共 ${quizSet.length} 題　原題庫第 ${id} 題`;
    document.getElementById('q-text').textContent = q.q.replace(/^\d+\.\s*/, '');
    const opts = document.getElementById('q-options');
    opts.innerHTML = q.options.map((opt, i) => `
        <label class="opt-label">
            <input type="radio" name="opt" value="${i}" ${answers[index] === i ? 'checked' : ''} ${submitted ? 'disabled' : ''} onchange="answer(${i})">
            ${opt}
        </label>`).join('');
    const fb = document.getElementById('feedback');
    if (submitted) {
        fb.style.display = 'block';
        if (answers[index] === q.ans) {
            fb.className = 'feedback ok'; fb.textContent = '答對了！';
        } else {
            fb.className = 'feedback fail';
            fb.innerHTML = `答錯了！正確答案：<strong>${q.options[q.ans]}</strong>`;
        }
    } else { fb.style.display = 'none'; }
    updateDots();
}

function answer(i) {
    answers[currentIndex] = i;
    delete skips[currentIndex];
    LS.save('hcvs_ans', answers); LS.save('hcvs_skips', skips);
    updateDots(); updateProgress();
}

function go(i) {
    if (i < 0 || i >= quizSet.length) return;
    if (!submitted && answers[currentIndex] === undefined) {
        skips[currentIndex] = true;
        LS.save('hcvs_skips', skips);
    }
    showQ(i);
}

function updateProgress() {
    document.getElementById('progress').textContent =
        `已答 ${Object.keys(answers).length} / ${quizSet.length} 題`;
}

function toggleTheme() {
    const html = document.documentElement;
    const dark = html.getAttribute('data-theme') === 'dark';
    dark ? html.removeAttribute('data-theme') : html.setAttribute('data-theme', 'dark');
    localStorage.setItem('hcvs_theme', dark ? 'light' : 'dark');
}

function toggleBookmark() {
    bookmarks[currentIndex] = !bookmarks[currentIndex];
    LS.save('hcvs_bk', bookmarks); updateDots();
}

function resetQuiz() {
    if (!confirm('確定重置並返回首頁？所有進度將清除。')) return;
    clearInterval(timer);
    LS.del('hcvs_active','hcvs_set','hcvs_ans','hcvs_skips','hcvs_bk','hcvs_idx','hcvs_secs','hcvs_submitted');
    document.getElementById('custom-num').value = '';
    show('setup');
}

function submitQuiz() {
    if (submitted) return;
    const unanswered = quizSet.length - Object.keys(answers).length;
    if (!confirm(unanswered > 0 ? `還有 ${unanswered} 題未作答，確定交卷？` : '確定交卷計分？')) return;
    clearInterval(timer); submitted = true;
    localStorage.setItem('hcvs_submitted', 'true');
    const score = quizSet.filter((q, i) => answers[i] === q.ans).length;
    const pct = Math.round(score / quizSet.length * 100);
    alert(`得分：${pct} 分\n答對：${score} / ${quizSet.length} 題\n耗時：${Math.floor(seconds/60)} 分 ${seconds%60} 秒`);
    showQ(currentIndex);
}
</script>
</body>
</html>
