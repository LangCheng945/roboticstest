<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全國技藝競賽 機器人學模擬測驗</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #003366;
            --border-color: #cccccc;
            --unanswered-bg: #f8f9fa;
            --answered-bg: #d1ecf1;
            --answered-text: #0c5460;
            --skipped-bg: #fff3cd;
            --skipped-text: #856404;
            --correct-bg: #d4edda;
            --correct-text: #155724;
            --wrong-bg: #f8d7da;
            --wrong-text: #721c24;
            --accent-color: #f39c12;
            --glass-bg: rgba(255,255,255,0.7);
            --glass-border: rgba(255,255,255,0.9);
            --option-hover: #e8f0fe;
        }

        [data-theme="dark"] {
            --bg-color: #0a1628;
            --card-bg: rgba(255,255,255,0.06);
            --text-color: #e0e0e0;
            --primary-color: #f39c12;
            --border-color: rgba(255,255,255,0.15);
            --unanswered-bg: rgba(255,255,255,0.05);
            --answered-bg: rgba(77,163,255,0.25);
            --answered-text: #a8d8ff;
            --skipped-bg: rgba(243,156,18,0.15);
            --skipped-text: #f8c96b;
            --correct-bg: rgba(40,167,69,0.2);
            --correct-text: #7ee8a2;
            --wrong-bg: rgba(220,53,69,0.2);
            --wrong-text: #f5a0a8;
            --accent-color: #f39c12;
            --glass-bg: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.12);
            --option-hover: rgba(243,156,18,0.12);
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;}

        /* 淺色模式背景 */
        body:not([data-theme="dark"]) {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* 深色模式：整頁漸層同首頁 */
        [data-theme="dark"] body,
        html[data-theme="dark"] body {
            background: linear-gradient(135deg, #0a1628 0%, #0a2a4a 60%, #0a1628 100%);
            background-attachment: fixed;
            color: var(--text-color);}

        /* ================= 首頁 ================= */
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a1628 0%, #003366 60%, #0a2a4a 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; gap: 0;
        }

        .setup-hero { text-align: center; margin-bottom: 36px; }

        .setup-eyebrow {
            font-size: 0.8rem; font-weight: 600; letter-spacing: 0.2em;
            text-transform: uppercase; color: rgba(255,255,255,0.45); margin: 0 0 16px 0;
        }

        .setup-title {
            font-size: 2.6rem; font-weight: 800; color: #ffffff;
            margin: 0 0 10px 0; letter-spacing: -0.02em; line-height: 1.15;
        }
        .setup-title span { color: #f39c12; }

        .setup-tagline { font-size: 0.95rem; color: rgba(255,255,255,0.5); margin: 0; font-weight: 400; }

        .setup-version-badge {
            display: inline-block;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5); font-size: 0.75rem; font-weight: 600;
            padding: 3px 10px; border-radius: 20px; margin-top: 14px; letter-spacing: 0.05em;
        }

        .setup-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-radius: 16px; padding: 32px 36px; width: 90%; max-width: 520px;
            display: flex; flex-direction: column; gap: 20px;}

        .setup-field-label {
            display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 8px;
        }

        .setup-row { display: flex; gap: 10px; align-items: center; }

        .select-input, .custom-input {
            flex: 1; padding: 11px 14px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15); font-size: 0.95rem;
            background: rgba(255,255,255,0.08); color: #ffffff; outline: none;
            transition: border-color 0.15s; min-width: 0;
        }
        .select-input:focus, .custom-input:focus { border-color: rgba(243,156,18,0.7); }
        .select-input option { background: #1a2a40; color: #ffffff; }
        .custom-input::placeholder { color: rgba(255,255,255,0.3); }

        .setup-divider { color: rgba(255,255,255,0.3); font-size: 0.85rem; white-space: nowrap; }

        /* 題庫範圍 row */
        .range-row { display: flex; align-items: center; gap: 8px; }
        .range-row .custom-input { width: 80px; flex: 0 0 80px; text-align: center; }
        .range-label { color: rgba(255,255,255,0.5); font-size: 0.9rem; white-space: nowrap; }

        .btn-start-full {
            width: 100%; padding: 14px 0; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; cursor: pointer;
            background: linear-gradient(90deg, #f39c12 0%, #e67e22 100%); color: #ffffff;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-start-full:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn-start-full:active { transform: translateY(0); }

        .setup-hint { font-size: 0.78rem; color: rgba(255,255,255,0.25); text-align: center; margin-top: 20px; }

        /* ================= 主畫面 ================= */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 10px; border-bottom: 3px solid var(--primary-color);
        }
        h1 { font-size: 1.4rem; margin: 0; color: var(--primary-color); }
        .header-controls { display: flex; align-items: center; gap: 10px; }

        .timer-box {
            background-color: #333; color: #ffc107; padding: 6px 12px; border-radius: 6px;
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.1rem;
            min-width: 70px; text-align: center; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn {
            background-color: var(--primary-color); color: white; border: none;
            padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem;
        }

        .main-container {
            display: flex; flex-direction: row; flex: 1; gap: 15px;
            margin-top: 15px; overflow: hidden; width: 100%;
        }

        /* 答題概況面板加大 */
        .left-panel {
            flex: 0 0 300px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-radius: 12px; padding: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            display: flex; flex-direction: column; overflow: hidden;
        }

        [data-theme="dark"] .left-panel {
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        .grid-title {
            font-size: 1rem; font-weight: bold; text-align: center;
            margin-bottom: 12px; color: var(--primary-color);
        }

        .question-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
            gap: 8px; overflow-y: auto; align-content: start; flex: 1; padding-right: 4px;
        }

        .grid-item {
            background-color: var(--unanswered-bg); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 10px 0; text-align: center; cursor: pointer;
            position: relative; font-weight: bold; font-size: 0.95rem; transition: transform 0.1s;
        }
        .grid-item:hover { transform: scale(1.05); }
        .grid-item.answered { background-color: var(--answered-bg); color: var(--answered-text); }
        .grid-item.skipped { background-color: var(--skipped-bg); color: var(--skipped-text); }
        .grid-item.panel-correct { background-color: var(--correct-bg) !important; color: var(--correct-text) !important; border-color: var(--correct-text); }
        .grid-item.panel-wrong { background-color: var(--wrong-bg) !important; color: var(--wrong-text) !important; border-color: var(--wrong-text); }
        .grid-item.panel-unanswered { background-color: var(--unanswered-bg) !important; color: #888 !important; border-color: var(--border-color); }

        .bookmark-star {
            position: absolute; top: 2px; right: 3px;
            color: #ffc107; font-size: 0.7rem; display: none;
            line-height: 1; pointer-events: none;
        }
        .grid-item.bookmarked .bookmark-star { display: block; }

        /* ================= 右側答題區 ================= */
        .right-panel {
            flex: 1;
            display: flex; flex-direction: column; overflow-y: auto; gap: 14px;
        }

        /* 統計列 */
        .stats-container {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 12px 18px; border-radius: 10px;
            border-left: 5px solid var(--primary-color);
        }
        .stats-bar { font-weight: bold; font-size: 1.05rem; color: var(--text-color); }
        .btn-reset { background-color: #6c757d; font-size: 0.85rem; padding: 6px 12px; }
        .btn-reset:hover { background-color: #dc3545; }

        /* 毛玻璃題目卡片 */
        .question-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-radius: 14px; padding: 28px 30px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; flex: 1; gap: 18px;
        }

        [data-theme="dark"] .question-card {
            box-shadow: 0 4px 32px rgba(0,0,0,0.4);
        }

        .question-number {
            font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--primary-color); opacity: 0.8;
        }

        .question-text {
            font-size: 1.15rem; font-weight: bold; line-height: 1.7;
            color: var(--text-color); margin: 0;
        }

        /* 選項 */
        .options-container { display: flex; flex-direction: column; gap: 10px; }

        .options-container label {
            display: flex; align-items: center;
            background: var(--unanswered-bg);
            border: 1px solid var(--border-color);
            padding: 13px 16px; border-radius: 10px;
            cursor: pointer; font-size: 1.05rem;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }
        .options-container label:hover { background: var(--option-hover); transform: translateX(3px); }
        .options-container input { margin-right: 12px; transform: scale(1.2); cursor: pointer; flex-shrink: 0; }

        /* 作答結果 */
        .result-box {
            padding: 14px 18px; border-radius: 10px; font-weight: bold;
            font-size: 1.05rem; display: none;
        }
        .correct-box { background-color: var(--correct-bg); color: var(--correct-text); border-left: 5px solid #28a745; }
        .wrong-box { background-color: var(--wrong-bg); color: var(--wrong-text); border-left: 5px solid #dc3545; }

        /* 翻頁按鈕 */
        .action-bar { display: flex; gap: 10px; }
        .action-bar .btn { flex: 1; padding: 13px 0; font-size: 1rem; border-radius: 10px; }

        footer { text-align: center; font-size: 0.95rem; font-weight: bold; color: #777; padding: 12px 0 5px 0; margin-top: auto; }
        footer .ver-highlight { color: var(--accent-color); margin-left: 8px; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .setup-title { font-size: 1.8rem; }
            .setup-card { padding: 24px 20px; }
            .header-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
            .timer-box { grid-column: span 2; width: 100%; box-sizing: border-box; font-size: 1rem; padding: 8px 0; text-align: center; }
            .header-controls .btn { padding: 10px 6px; font-size: 0.82rem; text-align: center; }
            header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .main-container { flex-direction: column; }
            .left-panel { flex: none; width: 100%; box-sizing: border-box; max-height: 180px; }
            .stats-container { flex-wrap: wrap; gap: 8px; }
            .stats-bar { flex: 1 1 100%; font-size: 0.95rem; }
            .btn-reset { white-space: nowrap; flex-shrink: 0; }
            .question-card { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-hero">
        <p class="setup-eyebrow">全國技藝競賽 / 機器人學</p>
        <h2 class="setup-title">即測即評<span>備戰平台</span></h2>
        <p class="setup-tagline">HCVS 選手專屬 · 邁向金手獎</p>
        <span class="setup-version-badge">Ver 6.6.158</span>
    </div>

    <div class="setup-card">
        <!-- 抽取題數 -->
        <div>
            <span class="setup-field-label">抽取題數</span>
            <div class="setup-row">
                <select id="quiz-num" class="select-input">
                    <option value="10">10 題</option>
                    <option value="30" selected>30 題</option>
                    <option value="50">50 題</option>
                    <option value="100">100 題</option>
                    <option value="200">200 題</option>
                </select>
                <span class="setup-divider">或</span>
                <input type="number" id="custom-num" class="custom-input" placeholder="自訂題數" min="1">
            </div>
        </div>

        <!-- 題庫範圍 -->
        <div>
            <span class="setup-field-label">題庫範圍（留空 = 全部）</span>
            <div class="range-row">
                <span class="range-label">第</span>
                <input type="number" id="range-start" class="custom-input" placeholder="1" min="1">
                <span class="range-label">題 到第</span>
                <input type="number" id="range-end" class="custom-input" placeholder="158" min="1">
                <span class="range-label">題</span>
            </div>
        </div>

        <button class="btn-start-full" onclick="startQuiz()">開始特訓</button>
    </div>

    <p class="setup-hint">作答進度與計時全自動儲存，重整網頁不遺失</p>
</div>

<header>
    <h1>機器人學即測即評</h1>
    <div class="header-controls">
        <div class="timer-box" id="timer-display">00:00</div>
        <button class="btn" style="background-color:#6c757d;" onclick="toggleTheme()">切換主題</button>
        <button class="btn" style="background-color:#e28743;" onclick="toggleBookmarkCurrent()">書籤</button>
        <button class="btn" style="background-color:#dc3545;" onclick="reportError()">錯誤回報</button>
        <button class="btn" style="background-color:#28a745;" onclick="submitQuiz()">交卷計分</button>
    </div>
</header>

<div class="main-container">
    <div class="left-panel">
        <div class="grid-title">答題概況</div>
        <div class="question-grid" id="number-grid"></div>
    </div>

    <div class="right-panel">
        <div class="stats-container">
            <div class="stats-bar" id="stats-counter">目前已答：0 題 / 總共：0 題</div>
            <button class="btn btn-reset" onclick="resetQuiz()">重新測驗</button>
        </div>

        <div class="question-card" id="quiz-area">
            <div class="question-number" id="q-number"></div>
            <div class="question-text" id="q-text">系統載入中...</div>
            <div class="options-container" id="q-options"></div>
            <div class="result-box" id="feedback-box"></div>
            <div class="action-bar">
                <button class="btn" style="background-color:#555;" onclick="changeQuestion(currentIndex - 1)">上一題</button>
                <button class="btn" onclick="changeQuestion(currentIndex + 1)">下一題</button>
            </div>
        </div>
    </div>
</div>

<footer>HCVS 專屬備戰平台 · 邁向金手獎 <span class="ver-highlight">Ver 6.6.158</span></footer>

<script>
    const questionBank = [
        { q: "1. 多軸關節式機器人(機器手臂)的特點是高自由度與靈活性...試問下列何者適合以並聯式機器人來開發？", options: ["(A) 汽車板金噴漆", "(B) 食品自動化整列", "(C) 手機外殼去毛邊及拋光", "(D) 汽車底盤焊接"], ans: 1 },
    ];

    let currentQuizSet = [], currentIndex = 0;
    let userAnswers = {}, skipStatus = {}, bookmarkStatus = {};
    let isSubmitted = false, totalSeconds = 0, timerInterval = null;

    window.onload = function () {
        const theme = localStorage.getItem('hcvs_theme');
        if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        if (localStorage.getItem('hcvs_has_active_quiz') === 'true') {
            document.getElementById('setup-screen').style.display = 'none';
            currentQuizSet = JSON.parse(localStorage.getItem('hcvs_current_set') || "[]");
            userAnswers = JSON.parse(localStorage.getItem('hcvs_answers') || "{}");
            skipStatus = JSON.parse(localStorage.getItem('hcvs_skips') || "{}");
            bookmarkStatus = JSON.parse(localStorage.getItem('hcvs_bookmarks') || "{}");
            let si = localStorage.getItem('hcvs_last_index');
            if (si !== null) currentIndex = parseInt(si);
            let ss = localStorage.getItem('hcvs_timer_seconds');
            if (ss !== null) totalSeconds = parseInt(ss);
            if (localStorage.getItem('hcvs_is_submitted') === 'true') isSubmitted = true;
            renderGrid(); showQuestion(currentIndex); updateStatsCounter(); updateTimerDisplay();
            if (!isSubmitted) startTimer(); else updateGridStatus();
        } else {
            document.getElementById('setup-screen').style.display = 'flex';
        }
    };

    function startTimer() {
        timerInterval = setInterval(() => {
            totalSeconds++;
            localStorage.setItem('hcvs_timer_seconds', totalSeconds);
            updateTimerDisplay();
        }, 1000);
    }

    function updateTimerDisplay() {
        let m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
        let s = String(totalSeconds % 60).padStart(2, '0');
        document.getElementById('timer-display').innerText = `${m}:${s}`;
    }

    function startQuiz() {
        // 題庫範圍篩選
        let rs = document.getElementById('range-start').value;
        let re = document.getElementById('range-end').value;
        let pool = questionBank;

        if (rs || re) {
            let start = rs ? parseInt(rs) : 1;
            let end = re ? parseInt(re) : questionBank.length;
            pool = questionBank.filter(q => {
                let id = parseInt(q.q.match(/^\d+/)[0]);
                return id >= start && id <= end;
            });
            if (pool.length === 0) { alert(`範圍第 ${start}–${end} 題沒有找到題目，請確認範圍！`); return; }
        }

        let customVal = document.getElementById('custom-num').value;
        let num = customVal ? parseInt(customVal) : parseInt(document.getElementById('quiz-num').value);
        if (num > pool.length) num = pool.length;
        if (num < 1 || isNaN(num)) { alert("請輸入有效的題數！"); return; }

        currentQuizSet = [...pool].sort(() => 0.5 - Math.random()).slice(0, num);
        userAnswers = {}; skipStatus = {}; bookmarkStatus = {};
        isSubmitted = false; totalSeconds = 0;
        localStorage.setItem('hcvs_has_active_quiz', 'true');
        localStorage.setItem('hcvs_current_set', JSON.stringify(currentQuizSet));
        localStorage.setItem('hcvs_bookmarks', JSON.stringify(bookmarkStatus));
        localStorage.removeItem('hcvs_is_submitted');
        document.getElementById('setup-screen').style.display = 'none';
        currentIndex = 0; renderGrid(); showQuestion(0); updateStatsCounter(); updateTimerDisplay(); startTimer();
    }

    function resetQuiz() {
        if (!confirm("確定要重置測驗嗎？這將會清空所有歷史進度與計時器，並返回首頁！")) return;
        clearInterval(timerInterval);
        isSubmitted = false; userAnswers = {}; skipStatus = {}; totalSeconds = 0;
        ['hcvs_has_active_quiz','hcvs_current_set','hcvs_answers','hcvs_skips','hcvs_bookmarks','hcvs_last_index','hcvs_timer_seconds','hcvs_is_submitted'].forEach(k => localStorage.removeItem(k));
        document.getElementById('custom-num').value = '';
        document.getElementById('range-start').value = '';
        document.getElementById('range-end').value = '';
        document.getElementById('setup-screen').style.display = 'flex';
    }

    function toggleTheme() {
        let html = document.documentElement;
        if (html.getAttribute('data-theme') === 'dark') {
            html.removeAttribute('data-theme'); localStorage.setItem('hcvs_theme', 'light');
        } else {
            html.setAttribute('data-theme', 'dark'); localStorage.setItem('hcvs_theme', 'dark');
        }
    }

    function renderGrid() {
        const grid = document.getElementById('number-grid');
        grid.innerHTML = '';
        currentQuizSet.forEach((q, index) => {
            let item = document.createElement('div');
            item.className = 'grid-item'; item.id = `grid-item-${index}`;
            item.innerHTML = `${index + 1}<span class="bookmark-star">*</span>`;
            item.onclick = () => changeQuestion(index);
            grid.appendChild(item);
        });
    }

    function changeQuestion(targetIndex) {
        if (targetIndex < 0 || targetIndex >= currentQuizSet.length) return;
        if (!isSubmitted) {
            if (userAnswers[currentIndex] === undefined) skipStatus[currentIndex] = true;
            else delete skipStatus[currentIndex];
            localStorage.setItem('hcvs_skips', JSON.stringify(skipStatus));
        }
        showQuestion(targetIndex);
    }

    function showQuestion(index) {
        currentIndex = index;
        localStorage.setItem('hcvs_last_index', currentIndex);
        const qData = currentQuizSet[currentIndex];
        let originalId = qData.q.match(/^\d+/)[0];
        let pureQText = qData.q.replace(/^\d+\.\s*/, '');

        document.getElementById('q-number').innerText = `第 ${index + 1} 題 ／ 原題庫第 ${originalId} 題`;
        document.getElementById('q-text').innerText = pureQText;

        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';
        qData.options.forEach((opt, optIdx) => {
            let label = document.createElement('label');
            let radio = document.createElement('input');
            radio.type = 'radio'; radio.name = 'q-opt'; radio.value = optIdx;
            if (userAnswers[currentIndex] === optIdx) radio.checked = true;
            if (isSubmitted) radio.disabled = true;
            radio.onchange = function () {
                userAnswers[currentIndex] = parseInt(this.value);
                delete skipStatus[currentIndex];
                localStorage.setItem('hcvs_answers', JSON.stringify(userAnswers));
                localStorage.setItem('hcvs_skips', JSON.stringify(skipStatus));
                updateStatsCounter(); updateGridStatus();
            };
            label.appendChild(radio); label.append(opt); optionsDiv.appendChild(label);
        });

        const feedback = document.getElementById('feedback-box');
        if (isSubmitted) {
            feedback.style.display = 'block';
            if (userAnswers[currentIndex] === qData.ans) {
                feedback.className = "result-box correct-box"; feedback.innerText = "答對了！";
            } else {
                feedback.className = "result-box wrong-box";
                feedback.innerHTML = `答錯了！<br>正確答案是：<strong>${qData.options[qData.ans]}</strong>`;
            }
        } else { feedback.style.display = 'none'; }
        updateGridStatus();
    }

    function reportError() {
        const qData = currentQuizSet[currentIndex];
        if (!qData) return;
        let originalId = qData.q.match(/^\d+/)[0];
        let pureQText = qData.q.replace(/^\d+\.\s*/, '');
        let reason = prompt(`您即將回報【原題庫第 ${originalId} 題】\n\n題目預覽：${pureQText.substring(0, 20)}...\n\n請輸入具體原因後按確定`);
        if (reason !== null) {
            window.open(`https://docs.google.com/forms/d/e/1FAIpQLSdbhLE_5m2wHknapDS176N-V5RW3JJwZse8EMjo967Xtk0P0w/viewform?usp=pp_url&entry.1177158450=原題庫第${originalId}題&entry.1960243392=${encodeURIComponent(reason)}`, '_blank');
        }
    }

    function updateStatsCounter() {
        document.getElementById('stats-counter').innerText = `目前已答：${Object.keys(userAnswers).length} 題 / 總共：${currentQuizSet.length} 題`;
    }

    function updateGridStatus() {
        currentQuizSet.forEach((q, index) => {
            let item = document.getElementById(`grid-item-${index}`);
            if (!item) return;
            item.classList.remove('answered','skipped','bookmarked','panel-correct','panel-wrong','panel-unanswered');
            if (bookmarkStatus[index]) item.classList.add('bookmarked');
            if (isSubmitted) {
                if (userAnswers[index] === undefined) item.classList.add('panel-unanswered');
                else if (userAnswers[index] === q.ans) item.classList.add('panel-correct');
                else item.classList.add('panel-wrong');
            } else {
                if (userAnswers[index] !== undefined) item.classList.add('answered');
                else if (skipStatus[index]) item.classList.add('skipped');
            }
            item.style.borderColor = index === currentIndex ? 'var(--primary-color)' : '';item.style.borderWidth = index === currentIndex ? '2px' : '';
        });
    }

    function toggleBookmarkCurrent() {
        bookmarkStatus[currentIndex] = !bookmarkStatus[currentIndex];
        localStorage.setItem('hcvs_bookmarks', JSON.stringify(bookmarkStatus));
        updateGridStatus();
    }

    function submitQuiz() {
        if (isSubmitted) return;
        let unanswered = currentQuizSet.length - Object.keys(userAnswers).length;
        if (unanswered > 0) { if (!confirm(`還有 ${unanswered} 題尚未作答，確定要提早交卷嗎？`)) return; }
        else { if (!confirm("確定要交卷結算分數嗎？")) return; }
        clearInterval(timerInterval); isSubmitted = true;
        localStorage.setItem('hcvs_is_submitted', 'true');
        let score = 0;
        currentQuizSet.forEach((q, index) => { if (userAnswers[index] === q.ans) score++; });
        let pct = Math.round((score / currentQuizSet.length) * 100);
        alert(`測驗結算完成！\n\n得分：${pct} 分\n答對題數：${score} / ${currentQuizSet.length} 題\n總共耗時：${Math.floor(totalSeconds / 60)} 分 ${totalSeconds % 60} 秒`);
        showQuestion(0);
    }
</script>
