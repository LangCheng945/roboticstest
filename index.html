<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全國技藝競賽 機器人學即測即評</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #003366;
            --border-color: #cccccc;
            --unanswered-bg: #f8f9fa;
            --answered-bg: #d1ecf1;
            --answered-text: #0c5460;
            --skipped-bg: #fff3cd;
            --skipped-text: #856404;
            --correct-bg: #d4edda;
            --correct-text: #155724;
            --wrong-bg: #f8d7da;
            --wrong-text: #721c24;
            --accent-color: #f39c12;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --primary-color: #4da3ff;
            --border-color: #444444;
            --unanswered-bg: #3a3a3a;
            --answered-bg: #114e60;
            --answered-text: #e0f7fa;
            --correct-bg: #1e4620;
            --correct-text: #a3e2a6;
            --wrong-bg: #5c1d24;
            --wrong-text: #f2a3a8;
        }

        body { font-family: system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }

        /* 首頁設定面板 */
        #setup-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-color); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; overflow-y: auto; }
        .setup-header { text-align: center; margin-bottom: 20px; padding-top: 20px; }
        .setup-header h2 { color: var(--primary-color); font-size: 2.1rem; margin: 0 0 8px 0; }
        .setup-subtitle { color: var(--accent-color); font-size: 1.1rem; font-weight: bold; margin: 0; }
        .setup-version { color: #888; font-weight: normal; font-size: 0.9rem; margin: 6px 0 0 0; }
        
        /* 縮小後的設定方框 */
        .setup-bar {
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 90%; max-width: 600px;
            border-top: 5px solid var(--primary-color);
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex; flex-direction: column; gap: 8px;
        }

        /* 允許太長時自動換行 */
        .input-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .input-row-block { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        
        .select-input, .custom-input { 
            padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); width: 100%; font-size: 1rem;
            background-color: var(--unanswered-bg); color: var(--text-color); box-sizing: border-box;
        }
        .custom-input { text-align: center; }

        .btn { background-color: var(--primary-color); color: white; border: none; padding: 12px; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100%; font-size: 1.1rem; }
        .btn-small { padding: 8px 12px; font-size: 0.95rem; width: auto; white-space: nowrap; }

        /* 測驗區 (桌機版) */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 3px solid var(--primary-color); }
        header h1 { font-size: 1.5rem; margin: 0; color: var(--primary-color); }
        .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end;}
        
        .timer-box {
            background-color: #333; color: #ffc107; padding: 6px 15px; border-radius: 6px;
            font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.1rem;
            text-align: center; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .main-container { display: flex; flex: 1; gap: 15px; margin-top: 15px; overflow: hidden; }
        .left-panel { flex: 0 0 240px; background: var(--card-bg); padding: 15px; border-radius: 8px; overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .right-panel { flex: 1; background: var(--card-bg); padding: 25px; border-radius: 8px; overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column;}
        
        .grid-title { font-size: 1rem; font-weight: bold; text-align: center; margin-bottom: 10px; color: var(--primary-color); }
        .question-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; align-content: start; }
        .grid-item { padding: 10px 0; border: 1px solid var(--border-color); text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; position: relative; background-color: var(--unanswered-bg); font-size: 0.95rem;}
        
        .grid-item.answered { background-color: var(--answered-bg); color: var(--answered-text); }
        .grid-item.skipped { background-color: var(--skipped-bg); color: var(--skipped-text); }
        .grid-item.panel-correct { background-color: var(--correct-bg) !important; color: var(--correct-text) !important; border-color: var(--correct-text); }
        .grid-item.panel-wrong { background-color: var(--wrong-bg) !important; color: var(--wrong-text) !important; border-color: var(--wrong-text); }
        .grid-item.panel-unanswered { background-color: var(--unanswered-bg) !important; color: #888 !important; border-color: var(--border-color); }
        .bookmark-star { position: absolute; top: 1px; right: 4px; color: var(--accent-color); font-size: 0.75rem; display: none; }
        .grid-item.bookmarked .bookmark-star { display: block; }

        .stats-container { display: flex; justify-content: space-between; align-items: center; background-color: var(--unanswered-bg); padding: 10px 15px; border-radius: 6px; margin-bottom: 15px; border-left: 5px solid var(--primary-color); }
        .stats-bar { font-weight: bold; font-size: 1.05rem; }
        .stat-line { display: inline-block; }
        
        .question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; line-height: 1.6; }
        .options-container label { display: block; background: var(--unanswered-bg); padding: 12px 15px; margin-bottom: 10px; border-radius: 6px; border: 1px solid var(--border-color); cursor: pointer; font-size: 1.05rem; }
        .options-container label:hover { background-color: var(--border-color); }
        .options-container input { margin-right: 12px; transform: scale(1.2); }
        
        .action-bar { display: flex; gap: 10px; margin-top: auto; padding-top: 15px; }
        .result-box { margin-top: 15px; padding: 15px; border-radius: 6px; font-weight: bold; font-size: 1.05rem; display: none; }
        .correct-box { background-color: var(--correct-bg); color: var(--correct-text); border-left: 5px solid #28a745; }
        .wrong-box { background-color: var(--wrong-bg); color: var(--wrong-text); border-left: 5px solid #dc3545; }

        footer { text-align: center; font-size: 0.85rem; color: #777; padding: 10px 0; margin-top: auto; font-weight: bold;}

        /* ======================================================= */
        /* 手機版專屬超強優化 (Mobile UI/UX)                       */
        /* ======================================================= */
        @media (max-width: 768px) {
            body { padding: 10px; }
            
            /* 首頁縮小方塊與換行 */
            .setup-header h2 { font-size: 1.8rem; }
            .setup-bar { padding: 15px; width: 95%; box-sizing: border-box; }
            .setup-grid { grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
            .control-group { background: rgba(0,0,0,0.03); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); }
            [data-theme="dark"] .control-group { background: rgba(255,255,255,0.05); }
            
            /* 頂部導覽列優化 */
            header { flex-direction: column; align-items: stretch; border-bottom: none; gap: 8px; }
            header h1 { text-align: center; font-size: 1.4rem; margin-bottom: 5px; }
            .header-controls { justify-content: center; }

            /* 主作答區調整比例 */
            .main-container { flex-direction: column; gap: 10px; margin-top: 5px; }
            .left-panel { flex: none; width: 100%; height: 120px; box-sizing: border-box; padding: 10px; }
            .right-panel { padding: 15px; box-sizing: border-box; }
            
            /* ======================================= */
            /* ✅ 完美解決狀態列換行與按鈕擠壓問題 */
            /* ======================================= */
            .stats-container { padding: 10px 12px; }
            .stats-bar { font-size: 0.95rem; line-height: 1.4; }
            
            /* 強制文字變兩行 */
            .stat-line { display: block; }
            .desktop-slash { display: none; }
            
            /* 重新測驗按鈕強制縮小且不斷行 */
            .btn-reset { 
                font-size: 0.8rem !important; 
                padding: 6px 12px !important; 
                flex-shrink: 0; /* 絕對不允許被壓縮 */
                white-space: nowrap; /* 絕對不允許文字換行 */
            }
            
            /* 下方按鈕加寬 */
            .action-bar .btn { padding: 12px; font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-header">
            <h2>全國技藝競賽 機器人學即測即評</h2>
            <p class="setup-subtitle">HCVS 選手專屬備戰平台</p>
            <p class="setup-version">Ver 6.9.258</p>
        </div>

        <div class="setup-bar">
            <div class="setup-grid">
                <!-- 範圍設定卡片 -->
                <div class="control-group">
                    <label style="font-weight:bold; color: var(--text-color);">題庫範圍</label>
                    <div class="input-row">
                        <div class="input-row-block">第 <input type="number" id="range-start" class="custom-input" value="1" min="1" style="width: 70px;"></div>
                        <div class="input-row-block">～ 第 <input type="number" id="range-end" class="custom-input" value="258" min="1" max="9999" style="width: 70px;"> 題</div>
                    </div>
                </div>
                <!-- 題數設定卡片 -->
                <div class="control-group">
                    <label style="font-weight:bold; color: var(--text-color);">抽取題數</label>
                    <div class="input-row">
                        <select id="quiz-num" class="select-input" style="flex:1; min-width:80px;">
                            <option value="10">10 題</option>
                            <option value="30" selected>30 題</option>
                            <option value="50">50 題</option>
                            <option value="100">100 題</option>
                            <option value="all">全考</option>
                        </select>
                        <div class="input-row-block">自訂: <input type="number" id="custom-num" class="custom-input" style="width:65px;" placeholder="題數"></div>
                    </div>
                </div>
            </div>
            <button class="btn" onclick="startQuiz()">開始特訓</button>
            <p style="text-align: center; font-size: 0.8rem; color: #888; margin: 15px 0 0 0;">作答進度與計時將全自動即時儲存，重整網頁不遺失。</p>
        </div>
    </div>

    <header>
        <h1>機器人學即測即評</h1>
        <div class="header-controls">
            <div class="timer-box" id="timer-display">00:00</div>
            <button class="btn btn-small" style="background-color:#6c757d;" onclick="toggleTheme()">切換主題</button>
            <button class="btn btn-small" style="background-color:#e28743;" onclick="toggleBookmarkCurrent()">★ 書籤</button>
            <button class="btn btn-small" style="background-color:#dc3545;" onclick="reportError()">錯誤回報</button>
            <button class="btn btn-small" style="background-color:#28a745;" onclick="submitQuiz()">交卷計分</button>
        </div>
    </header>

    <div class="main-container">
        <!-- 導覽方格區 -->
        <div class="left-panel">
            <div class="grid-title">答題概況</div>
            <div class="question-grid" id="number-grid"></div>
        </div>

        <!-- 作答區 -->
        <div class="right-panel">
            <div class="stats-container">
                <!-- ✅ 修改：利用 Span 來實現手機版自動換行，桌機版斜線 -->
                <div class="stats-bar" id="stats-counter"></div>
                <button class="btn btn-small btn-reset" onclick="resetQuiz()">重新測驗</button>
            </div>

            <div id="quiz-area" style="display: flex; flex-direction: column; flex: 1;">
                <div class="question-text" id="q-text">系統載入中...</div>
                <div class="options-container" id="q-options"></div>
                
                <div class="result-box" id="feedback-box"></div>

                <div class="action-bar">
                    <button class="btn" style="background-color:#555; flex: 1;" onclick="changeQuestion(currentIndex - 1)">上一題</button>
                    <button class="btn" style="flex: 1;" onclick="changeQuestion(currentIndex + 1)">下一題</button>
                </div>
            </div>
        </div>
    </div>

    <footer>HCVS 專屬備戰平台 • Ver 6.9.258</footer>

    <!-- 背景表單傳送通道 -->
    <form action="https://docs.google.com/forms/d/e/1FAIpQLSdbhLE_5m2wHknapDS176N-V5RW3JJwZse8EMjo967Xtk0P0w/formResponse" method="post" target="hidden_iframe" id="gform" style="display:none;">
        <input type="text" name="entry.1177158450" id="entry_id">
        <input type="text" name="entry.1960243392" id="entry_reason">
    </form>
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(window.submitted){ alert('錯誤回報已自動送出至後台。感謝協助！'); window.submitted=false; }"></iframe>

    <script>
        // 【注意】請將您完整的 258 題大陣列，貼在此處覆蓋這 5 題範例
        const questionBank = [
            { q: "1. 多軸關節式機器人(機器手臂)的特點是高自由度與靈活性...試問下列何者適合以並聯式機器人來開發？", options: ["(A) 汽車板金噴漆", "(B) 食品自動化整列", "(C) 手機外殼去毛邊及拋光", "(D) 汽車底盤焊接"], ans: 1 },
            { q: "2. 下列何種感測器可以測距離？", options: ["(A) 超音波感測器", "(B) 紅外線感測器", "(C) 雷射光感測器", "(D) 以上皆是"], ans: 3 },
            { q: "3. 下列何種通訊方式不屬於無線傳輸？", options: ["(A) Wi-Fi", "(B) Bluetooth 藍芽", "(C) ZigBee", "(D) RS232"], ans: 3 },
            { q: "4. 下列何者不屬於感測器？", options: ["(A) 陀螺儀(Gyroscope)", "(B) 光敏電阻(CdS)", "(C) LED燈", "(D) 加速度計"], ans: 2 },
            { q: "5. Boe-Bot(BB Car)自走車是一款機器人套件...下列何者是屬於自走車中致動器的部分？", options: ["(A) 微處理器", "(B) 馬達", "(C) 蜂鳴器", "(D) 紅外線頭燈"], ans: 1 }
        ];

        let currentQuizSet = [];
        let currentIndex = 0;
        let userAnswers = {};   
        let skipStatus = {};    
        let bookmarkStatus = {}; 
        let isSubmitted = false;
        window.submitted = false;

        let totalSeconds = 0;
        let timerInterval = null;

        window.onload = function() {
            if(localStorage.getItem('hcvs_theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            
            let hasHistory = localStorage.getItem('hcvs_has_active_quiz');
            if (hasHistory === 'true') {
                document.getElementById('setup-screen').style.display = 'none';
                
                currentQuizSet = JSON.parse(localStorage.getItem('hcvs_current_set') || "[]");
                userAnswers = JSON.parse(localStorage.getItem('hcvs_answers') || "{}");
                skipStatus = JSON.parse(localStorage.getItem('hcvs_skips') || "{}");
                bookmarkStatus = JSON.parse(localStorage.getItem('hcvs_bookmarks') || "{}");
                
                let savedIndex = localStorage.getItem('hcvs_last_index');
                if (savedIndex !== null) currentIndex = parseInt(savedIndex);

                let savedSeconds = localStorage.getItem('hcvs_timer_seconds');
                if (savedSeconds !== null) totalSeconds = parseInt(savedSeconds);

                if (localStorage.getItem('hcvs_is_submitted') === 'true') isSubmitted = true;

                renderGrid();
                showQuestion(currentIndex); 
                updateStatsCounter();
                updateTimerDisplay();
                
                if (!isSubmitted) startTimer();
                else updateGridStatus();
            } else {
                document.getElementById('setup-screen').style.display = 'flex';
            }
        };

        function startTimer() {
            timerInterval = setInterval(() => {
                totalSeconds++;
                localStorage.setItem('hcvs_timer_seconds', totalSeconds); 
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            let mins = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            let secs = String(totalSeconds % 60).padStart(2, '0');
            document.getElementById('timer-display').innerText = mins + ":" + secs;
        }

        function startQuiz() {
            let startIdx = parseInt(document.getElementById('range-start').value) || 1;
            let endIdx = parseInt(document.getElementById('range-end').value) || questionBank.length;
            
            if (startIdx < 1) startIdx = 1;
            if (endIdx > questionBank.length) endIdx = questionBank.length;
            if (startIdx > endIdx) { let temp = startIdx; startIdx = endIdx; endIdx = temp; }

            let rangedBank = questionBank.slice(startIdx - 1, endIdx);

            let selectVal = document.getElementById('quiz-num').value;
            let customVal = document.getElementById('custom-num').value;
            
            let num;
            if (customVal) {
                num = parseInt(customVal);
            } else if (selectVal === 'all') {
                num = rangedBank.length;
            } else {
                num = parseInt(selectVal);
            }
            
            if (num > rangedBank.length) num = rangedBank.length;
            if (num < 1 || isNaN(num)) {
                alert("請輸入有效的題數");
                return;
            }

            let shuffled = [...rangedBank].sort(() => 0.5 - Math.random());
            currentQuizSet = shuffled.slice(0, num);
            
            userAnswers = {}; skipStatus = {}; bookmarkStatus = {}; isSubmitted = false; totalSeconds = 0;
            
            localStorage.setItem('hcvs_has_active_quiz', 'true');
            localStorage.setItem('hcvs_current_set', JSON.stringify(currentQuizSet));
            localStorage.setItem('hcvs_bookmarks', JSON.stringify(bookmarkStatus));
            localStorage.removeItem('hcvs_is_submitted');

            document.getElementById('setup-screen').style.display = 'none';
            
            currentIndex = 0;
            renderGrid();
            showQuestion(0);
            updateStatsCounter();
            updateTimerDisplay();
            startTimer();
        }

        function resetQuiz() {
            if (!confirm("確定要重置測驗嗎？這將會清空歷史進度與計時器，並返回首頁。")) return;

            clearInterval(timerInterval);
            isSubmitted = false;
            userAnswers = {}; skipStatus = {}; totalSeconds = 0;

            localStorage.removeItem('hcvs_has_active_quiz');
            localStorage.removeItem('hcvs_current_set');
            localStorage.removeItem('hcvs_answers');
            localStorage.removeItem('hcvs_skips');
            localStorage.removeItem('hcvs_bookmarks');
            localStorage.removeItem('hcvs_last_index');
            localStorage.removeItem('hcvs_timer_seconds');
            localStorage.removeItem('hcvs_is_submitted');

            document.getElementById('custom-num').value = '';
            document.getElementById('setup-screen').style.display = 'flex';
        }

        function toggleTheme() {
            let body = document.documentElement;
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                localStorage.setItem('hcvs_theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('hcvs_theme', 'dark');
            }
        }

        function renderGrid() {
            const grid = document.getElementById('number-grid');
            grid.innerHTML = '';
            currentQuizSet.forEach((q, index) => {
                let item = document.createElement('div');
                item.className = 'grid-item';
                item.id = "grid-item-" + index;
                item.innerHTML = (index + 1) + "<span class='bookmark-star'>★</span>";
                item.onclick = () => changeQuestion(index); 
                grid.appendChild(item);
            });
        }

        function changeQuestion(targetIndex) {
            if (targetIndex < 0 || targetIndex >= currentQuizSet.length) return;
            
            if (!isSubmitted) {
                if (userAnswers[currentIndex] === undefined) {
                    skipStatus[currentIndex] = true;
                } else {
                    delete skipStatus[currentIndex];
                }
                localStorage.setItem('hcvs_skips', JSON.stringify(skipStatus));
            }
            showQuestion(targetIndex);
        }

        function showQuestion(index) {
            currentIndex = index;
            localStorage.setItem('hcvs_last_index', currentIndex);

            const qData = currentQuizSet[currentIndex];
            let originalId = qData.q.match(/^\d+/)[0];
            let pureQText = qData.q.replace(/^\d+\.\s*/, '');
            document.getElementById('q-text').innerText = "【第 " + (index + 1) + " 題 / 原題庫第 " + originalId + " 題】\n" + pureQText;
            
            const optionsDiv = document.getElementById('q-options');
            optionsDiv.innerHTML = '';

            qData.options.forEach((opt, optIdx) => {
                let label = document.createElement('label');
                let radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q-opt';
                radio.value = optIdx;
                if (userAnswers[currentIndex] === optIdx) radio.checked = true;
                if (isSubmitted) radio.disabled = true;

                radio.onchange = function() {
                    userAnswers[currentIndex] = parseInt(this.value);
                    delete skipStatus[currentIndex]; 
                    
                    localStorage.setItem('hcvs_answers', JSON.stringify(userAnswers));
                    localStorage.setItem('hcvs_skips', JSON.stringify(skipStatus));
                    
                    updateStatsCounter(); 
                    updateGridStatus();
                };

                label.appendChild(radio);
                label.append(opt);
                optionsDiv.appendChild(label);
            });

            const feedback = document.getElementById('feedback-box');
            if (isSubmitted) {
                feedback.style.display = 'block';
                if (userAnswers[currentIndex] === qData.ans) {
                    feedback.className = "result-box correct-box";
                    feedback.innerText = "答對了！";
                } else {
                    feedback.className = "result-box wrong-box";
                    feedback.innerHTML = "答錯了！<br>正確答案是：<strong>" + qData.options[qData.ans] + "</strong>";
                }
            } else {
                feedback.style.display = 'none';
            }

            updateGridStatus();
        }

        function reportError() {
            const qData = currentQuizSet[currentIndex];
            if (!qData) return;
            
            let originalId = qData.q.match(/^\d+/)[0];
            let pureQText = qData.q.replace(/^\d+\.\s*/, '');
            
            let reason = prompt("即將回報【原題庫第 " + originalId + " 題】\n\n題目預覽：" + pureQText.substring(0, 20) + "...\n\n請輸入錯誤原因 (按下確定後系統將自動於背景送出)：");
            
            if (reason !== null && reason.trim() !== "") {
                document.getElementById('entry_id').value = "第 " + originalId + " 題";
                document.getElementById('entry_reason').value = reason;
                window.submitted = true;
                document.getElementById('gform').submit();
            } else if (reason !== null) {
                alert("回報失敗：請輸入具體原因");
            }
        }

        // ✅ 支援手機版雙行文字、桌機版單行斜線的計數器
        function updateStatsCounter() {
            let answeredCount = Object.keys(userAnswers).length;
            let totalCount = currentQuizSet.length;
            document.getElementById('stats-counter').innerHTML = 
                "<span class='stat-line'>目前已答：" + answeredCount + " 題</span>" +
                "<span class='desktop-slash'> / </span>" +
                "<span class='stat-line'>總共：" + totalCount + " 題</span>";
        }

        function updateGridStatus() {
            currentQuizSet.forEach((q, index) => {
                let item = document.getElementById("grid-item-" + index);
                if (!item) return;
                
                item.classList.remove('answered', 'skipped', 'bookmarked', 'panel-correct', 'panel-wrong', 'panel-unanswered');

                if (bookmarkStatus[index]) item.classList.add('bookmarked');

                if (isSubmitted) {
                    if (userAnswers[index] === undefined) {
                        item.classList.add('panel-unanswered'); 
                    } else if (userAnswers[index] === q.ans) {
                        item.classList.add('panel-correct');    
                    } else {
                        item.classList.add('panel-wrong');      
                    }
                } else {
                    if (userAnswers[index] !== undefined) {
                        item.classList.add('answered'); 
                    } else if (skipStatus[index]) {
                        item.classList.add('skipped');  
                    }
                }
                
                item.style.borderColor = (index === currentIndex) ? 'var(--primary-color)' : 'var(--border-color)';
                item.style.borderWidth = (index === currentIndex) ? '2px' : '1px';
            });
        }

        function toggleBookmarkCurrent() {
            bookmarkStatus[currentIndex] = !bookmarkStatus[currentIndex];
            localStorage.setItem('hcvs_bookmarks', JSON.stringify(bookmarkStatus)); 
            updateGridStatus();
        }

        function submitQuiz() {
            if(isSubmitted) return;
            
            let unansweredCount = currentQuizSet.length - Object.keys(userAnswers).length;
            if (unansweredCount > 0) {
                if(!confirm("還有 " + unansweredCount + " 題尚未作答，確定要提早交卷嗎？")) return;
            } else {
                if(!confirm("確定要交卷結算分數嗎？")) return;
            }

            clearInterval(timerInterval); 
            isSubmitted = true;
            localStorage.setItem('hcvs_is_submitted', 'true'); 
            
            let score = 0;
            currentQuizSet.forEach((q, index) => {
                if (userAnswers[index] === q.ans) score++;
            });

            let finalPercent = Math.round((score / currentQuizSet.length) * 100);
            let finalMins = Math.floor(totalSeconds / 60);
            let finalSecs = totalSeconds % 60;
            
            alert("測驗結算完成\n\n得分：" + finalPercent + " 分\n答對題數：" + score + " / " + currentQuizSet.length + " 題\n總共耗時：" + finalMins + " 分 " + finalSecs + " 秒");
            showQuestion(0); 
        }
    </script>
</body>
</html>
