<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全國技藝競賽 機器人學即測即評</title>
    <style>
        /* =========================================
           色彩變數定義 (亮色/深色雙主題支援)
        ========================================= */
        :root {
            --bg: #f4f7f6;
            --card: #ffffff;
            --border: #cccccc;
            --text: #333333;
            --sub: #666666;
            --primary: #004080;
            --answered: rgba(0, 64, 128, 0.1);
            --answered-text: #004080;
            --skipped: rgba(0, 0, 0, 0.05);
            --skipped-text: #666666;
            --correct-bg: rgba(40, 167, 69, 0.15);
            --correct: #155724;
            --wrong-bg: rgba(220, 53, 69, 0.15);
            --wrong: #721c24;
            --hover: #e9ecef;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --card: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.10);
            --text: #e0e0e0;
            --sub: rgba(255,255,255,0.35);
            --primary: #e2e8f0;
            --answered: rgba(200,200,200,0.18);
            --answered-text: #c8d6e5;
            --skipped: rgba(200,200,200,0.08);
            --skipped-text: #888;
            --correct-bg: rgba(40,167,69,0.18);
            --correct: #7ee8a2;
            --wrong-bg: rgba(220,53,69,0.18);
            --wrong: #f5a0a8;
            --hover: rgba(255,255,255,0.07);
        }

        /* =========================================
           全域與基本排版
        ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 15px; display: flex; flex-direction: column; height: 100vh;
            background-color: var(--bg); color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }
        
        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 60%, #0a0a0a 100%);
            background-attachment: fixed;
        }

        /* =========================================
           ✨ 全新首頁設定面板 (強制深色質感 UI)
        ========================================= */
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 60%, #0a0a0a 100%);
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; font-family: system-ui, -apple-system, sans-serif;
        }
        
        #setup-screen .hero { text-align: center; margin-bottom: 36px; }
        #setup-screen .eyebrow { font-size: 0.85rem; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; margin-bottom: 12px; font-weight: 600;}
        #setup-screen .title { font-size: 2.8rem; font-weight: 900; margin-bottom: 10px; line-height: 1.2; letter-spacing: -0.02em; }
        #setup-screen .title .gray { color: #9ca3af; }
        #setup-screen .title .white { color: #ffffff; }
        #setup-screen .tagline { font-size: 0.95rem; color: rgba(255,255,255,0.35); margin-bottom: 14px; }
        #setup-screen .version {
            display: inline-block; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4);
            font-size: 0.75rem; padding: 3px 14px; border-radius: 20px; letter-spacing: 0.05em; font-weight: bold;
        }
        #setup-screen .card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 28px 32px; width: 100%; max-width: 520px;
            display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #setup-screen .field-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
        #setup-screen .row { display: flex; align-items: center; gap: 10px; width: 100%; }
        #setup-screen select, #setup-screen input[type=number] {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: #e0e0e0; padding: 11px 14px; border-radius: 8px; font-size: 1rem; font-weight: 600;
            outline: none; width: 100%; text-align: center;
        }
        #setup-screen select:focus, #setup-screen input[type=number]:focus { border-color: rgba(255,255,255,0.4); }
        #setup-screen select option { background: #1e1e1e; color: #e0e0e0;}
        #setup-screen input::placeholder { color: rgba(255,255,255,0.25); font-weight: 400; }
        #setup-screen .sep { color: rgba(255,255,255,0.35); white-space: nowrap; font-size: 0.95rem; font-weight: 600; }
        #setup-screen .btn-start {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background: rgba(255,255,255,0.15); color: #e0e0e0;
            font-size: 1.15rem; font-weight: 700; cursor: pointer; letter-spacing: 0.05em;
            transition: background 0.2s, transform 0.1s; margin-top: 5px;
        }
        #setup-screen .btn-start:hover { background: rgba(255,255,255,0.22); transform: translateY(-2px); }
        #setup-screen .hint { text-align: center; font-size: 0.82rem; color: rgba(255,255,255,0.25); }

        /* =========================================
           頂部導航與功能鍵
        ========================================= */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
        h1 { font-size: 1.3rem; font-weight: 800; color: var(--primary); letter-spacing: -0.01em; }
        .header-controls { display: flex; align-items: center; gap: 8px; }
        
        .timer-box {
            background: #222222; color: #ffc107; padding: 6px 14px; border-radius: 7px;
            font-family: 'Courier New', monospace; font-weight: 700; font-size: 1.05rem;
            border: 1px solid #111111; text-align: center; min-width: 75px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.6);
        }

        .btn {
            padding: 7px 13px; border-radius: 7px; border: 1px solid var(--border);
            font-size: 0.85rem; font-weight: 700; cursor: pointer; color: #fff;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }

        /* =========================================
           作答主畫面排版
        ========================================= */
        .main { display: flex; gap: 13px; flex: 1; overflow: hidden; margin-top: 13px; }

        /* 左側題號網格 */
        .left-panel {
            flex: 0 0 280px; background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px; display: flex; flex-direction: column; overflow: hidden;
        }
        .grid-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sub); text-align: center; margin-bottom: 12px; }
        .question-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 6px; overflow-y: auto; align-content: start; flex: 1; padding-right: 4px; }
        
        .grid-item {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 8px; padding: 9px 0; text-align: center; cursor: pointer;
            font-weight: 700; font-size: 0.9rem; position: relative;
            transition: transform 0.1s, background 0.15s; color: var(--text);
        }
        .grid-item:hover { transform: scale(1.07); background: var(--hover); }
        .grid-item.active { border-color: var(--primary); border-width: 2px; }
        .grid-item.answered { background: var(--answered); color: var(--answered-text); }
        .grid-item.skipped { background: var(--skipped); color: var(--skipped-text); }
        .grid-item.panel-correct { background: var(--correct-bg); color: var(--correct); border-color: var(--correct); }
        .grid-item.panel-wrong { background: var(--wrong-bg); color: var(--wrong); border-color: var(--wrong); }
        .grid-item.panel-unanswered { background: var(--skipped); color: var(--sub); border-color: var(--border); }
        
        .bookmark-star { position: absolute; top: 2px; right: 3px; color: #ffc107; font-size: 0.6rem; display: none; line-height: 1; pointer-events: none; }
        .grid-item.bookmarked .bookmark-star { display: block; }

        /* 右側題目區 */
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card); border: 1px solid var(--border);
            border-left: 4px solid var(--primary); padding: 11px 16px; border-radius: 10px;
            font-weight: 700; font-size: 1rem; color: var(--text);
        }
        
        .btn-reset { background: #444 !important; font-size: 0.82rem; padding: 6px 11px; }
        .btn-reset:hover { background: #8b1c1c !important; }

        .question-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 14px;
            padding: 26px 28px; display: flex; flex-direction: column; gap: 18px; flex: 1;
            box-shadow: 0 4px 32px rgba(0,0,0,0.5);
        }
        .q-meta { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sub); }
        .q-text { font-size: 1.13rem; font-weight: 700; line-height: 1.75; color: var(--text); }

        /* =========================================
           選項設計
        ========================================= */
        .options { display: flex; flex-direction: column; gap: 8px; }
        
        .opt-label {
            display: flex; align-items: center; gap: 0;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 10px; cursor: pointer; overflow: hidden;
            transition: background 0.15s, transform 0.1s; position: relative;
        }
        .opt-label:hover { background: var(--hover); transform: translateX(3px); }
        
        .opt-letter {
            width: 44px; flex-shrink: 0; text-align: center; font-size: 0.82rem; font-weight: 800;
            color: var(--sub); padding: 14px 0; border-right: 1px solid var(--border); transition: color 0.15s;
        }
        
        .opt-body { padding: 14px 16px; font-size: 1rem; line-height: 1.5; flex: 1; color: var(--text); font-weight: 600;}
        .opt-label input[type=radio] { display: none; }
        
        /* 選擇狀態 */
        .opt-label:has(input:checked) { background: var(--answered); border-color: var(--primary); }
        .opt-label:has(input:checked)::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--primary); }
        .opt-label:has(input:checked) .opt-letter { color: var(--primary); border-right-color: var(--primary); background: transparent; }
        
        /* 批改狀態 */
        .opt-label.correct { background: var(--correct-bg) !important; border-color: #28a745 !important; }
        .opt-label.correct::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #28a745; }
        .opt-label.correct .opt-letter { color: var(--correct); border-right-color: var(--correct); }
        
        .opt-label.wrong { background: var(--wrong-bg) !important; border-color: #dc3545 !important; }
        .opt-label.wrong::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #dc3545; }
        .opt-label.wrong .opt-letter { color: var(--wrong); border-right-color: var(--wrong); }

        /* 結果提示區 */
        .result-box { display: none; padding: 13px 16px; border-radius: 10px; font-weight: 700; font-size: 1rem; }
        .correct-box { background: var(--correct-bg); color: var(--correct); border-left: 4px solid #28a745; }
        .wrong-box { background: var(--wrong-bg); color: var(--wrong); border-left: 4px solid #dc3545; }

        .action-bar { display: flex; gap: 10px; margin-top: auto; }
        .action-bar .btn { flex: 1; padding: 12px 0; font-size: 0.95rem; border-radius: 10px; border: none; }

        footer { text-align: center; font-size: 0.85rem; color: var(--sub); padding: 10px 0; font-weight: bold; }

        /* =========================================
           📱 手機版專屬優化 
        ========================================= */
        @media (max-width: 768px) {
            body { padding: 10px; }
            
            /* 新首頁手機版優化 */
            #setup-screen .title { font-size: 2.2rem; }
            #setup-screen .card { padding: 24px 20px; gap: 16px; }
            #setup-screen .row { flex-wrap: wrap; }
            
            /* 頂部防誤觸大網格 */
            header { flex-direction: column; align-items: stretch; border-bottom: none; gap: 10px; }
            header h1 { text-align: center; font-size: 1.4rem; }
            .header-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
            .timer-box { grid-column: span 2; width: 100%; padding: 10px; font-size: 1.1rem; box-sizing: border-box; }
            .header-controls .btn { padding: 10px 6px; font-size: 0.82rem; width: 100%; text-align: center; box-sizing: border-box; }

            /* 主作答區調整比例 */
            .main { flex-direction: column; gap: 10px; }
            .left-panel { flex: none; width: 100%; height: 140px; box-sizing: border-box; padding: 12px; }
            .right-panel { padding: 0; box-sizing: border-box; gap: 10px; }
            .question-card { padding: 20px 18px; }
            
            /* 狀態列自動換行與保護 */
            .stats-bar { padding: 12px 15px; flex-direction: column; gap: 8px; align-items: stretch; text-align: center; }
            .stat-line { display: block; font-size: 0.95rem; line-height: 1.4;}
            .desktop-slash { display: none; }
            .btn-reset { font-size: 0.8rem !important; padding: 8px 12px !important; margin-top: 5px;}
            
            /* 選項區更適合點擊 */
            .opt-letter { width: 40px; }
            .opt-body { padding: 12px 15px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="hero">
            <p class="eyebrow">全國技藝競賽 / 機器人學</p>
            <h1 class="title"><span class="gray">即測即評</span><span class="white">備戰平台</span></h1>
            <p class="tagline">HCVS 選手專屬 · 邁向金手獎</p>
            <span class="version">Ver 6.9.258</span>
        </div>

        <div class="card">
            <div>
                <div class="field-label">抽取題數</div>
                <div class="row">
                    <select id="quiz-num" style="flex:2;">
                        <option value="10">10 題</option>
                        <option value="30" selected>30 題</option>
                        <option value="50">50 題</option>
                        <option value="100">100 題</option>
                        <option value="all">範圍內全考</option>
                    </select>
                    <span class="sep">或</span>
                    <input type="number" id="custom-num" placeholder="自訂題數" style="flex:2;">
                </div>
            </div>

            <div>
                <div class="field-label">題庫範圍（留空 = 全部）</div>
                <div class="row">
                    <span class="sep">第</span>
                    <input type="number" id="range-start" placeholder="1" min="1" style="flex:1;">
                    <span class="sep">題 到第</span>
                    <input type="number" id="range-end" placeholder="258" min="1" max="9999" style="flex:1;">
                    <span class="sep">題</span>
                </div>
            </div>

            <button class="btn-start" onclick="startQuiz()">開始特訓</button>
            <p class="hint">作答進度與計時全自動儲存，重整網頁不遺失</p>
        </div>
    </div>
    <header>
        <h1>機器人學即測即評</h1>
        <div class="header-controls">
            <div class="timer-box" id="timer-display">00:00</div>
            <button class="btn" style="background:#333;" onclick="toggleTheme()">切換主題</button>
            <button class="btn" style="background:#b07d10;" onclick="toggleBookmarkCurrent()">書籤</button>
            <button class="btn" style="background:#8b1c1c;" onclick="reportError()">錯誤回報</button>
            <button class="btn" style="background:#155724;" onclick="submitQuiz()">交卷計分</button>
        </div>
    </header>

    <div class="main">
        <div class="left-panel">
            <div class="grid-title">答題概況</div>
            <div class="question-grid" id="number-grid"></div>
        </div>

        <div class="right-panel">
            <div class="stats-bar">
                <span id="stats-counter"></span>
                <button class="btn btn-reset" onclick="resetQuiz()">重新測驗</button>
            </div>

            <div class="question-card">
                <div class="q-meta" id="q-number">系統載入中...</div>
                <div class="q-text" id="q-text"></div>
                
                <div class="options" id="q-options"></div>
                
                <div class="result-box" id="feedback-box"></div>

                <div class="action-bar">
                    <button class="btn" style="background:#333;" onclick="changeQuestion(currentIndex - 1)">← 上一題</button>
                    <button class="btn" style="background:#333;" onclick="changeQuestion(currentIndex + 1)">下一題 →</button>
                </div>
            </div>
        </div>
    </div>

    <footer>HCVS 專屬備戰平台 · 邁向金手獎 &nbsp; Ver 6.9.258</footer>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSdbhLE_5m2wHknapDS176N-V5RW3JJwZse8EMjo967Xtk0P0w/formResponse" method="post" target="hidden_iframe" id="gform" style="display:none;">
        <input type="text" name="entry.1177158450" id="entry_id">
        <input type="text" name="entry.1960243392" id="entry_reason">
    </form>
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(window.submitted){ alert('錯誤回報已自動送出至後台。感謝協助！'); window.submitted=false; }"></iframe>

    <script>
        // ==========================================
        // 🚨 請在此處貼入您備份的 258 題大陣列 🚨
        // ==========================================
        const questionBank = [
        { q: "1. 多軸關節式機器人(機器手臂)的特點是高自由度與靈活性...試問下列何者適合以並聯式機器人來開發？", options: ["(A) 汽車板金噴漆", "(B) 食品自動化整列", "(C) 手機外殼去毛邊及拋光", "(D) 汽車底盤焊接"], ans: 1 },
    { q: "2. 下列何種感測器可以測距離？", options: ["(A) 超音波感測器", "(B) 紅外線感測器", "(C) 雷射光感測器", "(D) 以上皆是"], ans: 3 },
    { q: "3. 下列何種通訊方式不屬於無線傳輸？", options: ["(A) Wi-Fi", "(B) Bluetooth 藍芽", "(C) ZigBee", "(D) RS232"], ans: 3 },
    { q: "4. 下列何者不屬於感測器？", options: ["(A) 陀螺儀(Gyroscope)", "(B) 光敏電阻(CdS)", "(C) LED燈", "(D) 加速度計"], ans: 2 },
    { q: "5. Boe-Bot(BB Car)自走車是一款機器人套件，可以依照個人喜好進行自走車功能的設定，如避障或循線等等，套件所包含的元件有微處理器、多功能電路板、馬達、蜂鳴器、光敏電阻、電阻、紅外線頭燈、各式線材以及機構部分。下列何者是屬於自走車中致動器的部分？", options: ["(A) 微處理器", "(B) 馬達", "(C) 蜂鳴器", "(D) 紅外線頭燈"], ans: 1 },
    { q: "6. Boe-Bot(BB Car)自走車是一款機器人套件，可以依照個人喜好進行自走車功能的設定，如避障或循線等等，套件所包含的元件有微處理器、多功能電路板、馬達、蜂鳴器、光敏電阻、電阻、紅外線頭燈、各式線材以及機構部分。下列何者是屬於自走車中控制單元(Control Unit)的部分？", options: ["(A) 微處理器", "(B) 馬達", "(C) 蜂鳴器", "(D) 紅外線頭燈"], ans: 0 },
    { q: "7. Boe-Bot(BB Car)自走車是一款機器人套件，可以依照個人喜好進行自走車功能的設定，如避障或循線等等，套件所包含的元件有微處理器、多功能電路板、馬達、蜂鳴器、光敏電阻、電阻、紅外線頭燈、各式線材以及機構部分。MHz為微處理器其中一個性能指標，試問 MHz 代表的意義為？", options: ["(A) 每秒執行指令數", "(B) 每秒系統執行浮點運算數", "(C) 時脈(Clock Speed)", "(D) 運作電壓"], ans: 2 },
    { q: "8. 考量強度有些機器人的機體材質使用金屬構成，就會有重量的問題...試問下列哪一項是挑選馬達的主要因素？", options: ["(A) 精度", "(B) 功耗", "(C) 體積", "(D) 扭力"], ans: 3 },
    { q: "9. iRobot 家用吸塵機器人平均25坪大小需要花一小時清理，所需功率為33Wh...試問要選以下何種規格的電池可以確保完成清潔作業？", options: ["(A) 14.4V/3500mAH", "(B) 14.4V/3000mAH", "(C) 22.2V/1500mAH", "(D) 14.8V/4400mAH"], ans: 3 },
    { q: "10. 下列何種通訊技術的功耗最低？", options: ["(A) Wi-Fi", "(B) Bluetooth", "(C) ZigBee", "(D) UWB"], ans: 2 },

        let currentQuizSet = [];
        let currentIndex = 0;
        let userAnswers = {};   
        let skipStatus = {};    
        let bookmarkStatus = {}; 
        let isSubmitted = false;
        window.submitted = false;
        let totalSeconds = 0;
        let timerInterval = null;

        window.onload = function() {
            // ✅ 核心 Bug 修復：自動正規化題庫答案格式 (將 "B" 轉成對應索引 1)
            questionBank.forEach(q => {
                if (typeof q.ans === 'string') {
                    let match = q.ans.match(/[A-E]/i);
                    if (match) {
                        q.ans = match[0].toUpperCase().charCodeAt(0) - 65;
                    } else {
                        q.ans = parseInt(q.ans);
                    }
                }
            });

            let savedTheme = localStorage.getItem('hcvs_theme');
            if(savedTheme === 'light') document.documentElement.removeAttribute('data-theme');
            
            let hasHistory = localStorage.getItem('hcvs_has_active_quiz');
            if (hasHistory === 'true') {
                document.getElementById('setup-screen').style.display = 'none';
                
                currentQuizSet = JSON.parse(localStorage.getItem('hcvs_current_set') || "[]");
                userAnswers = JSON.parse(localStorage.getItem('hcvs_answers') || "{}");
                skipStatus = JSON.parse(localStorage.getItem('hcvs_skips') || "{}");
                bookmarkStatus = JSON.parse(localStorage.getItem('hcvs_bookmarks') || "{}");
                
                let savedIndex = localStorage.getItem('hcvs_last_index');
                if (savedIndex !== null) currentIndex = parseInt(savedIndex);

                let savedSeconds = localStorage.getItem('hcvs_timer_seconds');
                if (savedSeconds !== null) totalSeconds = parseInt(savedSeconds);

                if (localStorage.getItem('hcvs_is_submitted') === 'true') isSubmitted = true;

                renderGrid(); showQuestion(currentIndex); updateStatsCounter(); updateTimerDisplay();
                
                if (!isSubmitted) startTimer();
                else updateGridStatus();
            } else {
                document.getElementById('setup-screen').style.display = 'flex';
            }
        };

        function startTimer() {
            timerInterval = setInterval(() => {
                totalSeconds++;
                localStorage.setItem('hcvs_timer_seconds', totalSeconds); 
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            let mins = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            let secs = String(totalSeconds % 60).padStart(2, '0');
            document.getElementById('timer-display').innerText = mins + ":" + secs;
        }

        function startQuiz() {
            if(questionBank.length === 0) {
                alert("目前題庫為空！請先在原始碼的 questionBank 陣列中貼入題目資料。");
                return;
            }

            let startIdx = parseInt(document.getElementById('range-start').value) || 1;
            let endIdx = parseInt(document.getElementById('range-end').value) || questionBank.length;
            
            if (startIdx < 1) startIdx = 1;
            if (endIdx > questionBank.length) endIdx = questionBank.length;
            if (startIdx > endIdx) { let temp = startIdx; startIdx = endIdx; endIdx = temp; }

            let rangedBank = questionBank.slice(startIdx - 1, endIdx);
            let selectVal = document.getElementById('quiz-num').value;
            let customVal = document.getElementById('custom-num').value;
            
            let num = customVal ? parseInt(customVal) : (selectVal === 'all' ? rangedBank.length : parseInt(selectVal));
            if (num > rangedBank.length) num = rangedBank.length;
            if (num < 1 || isNaN(num)) { alert("請輸入有效的題數"); return; }

            currentQuizSet = [...rangedBank].sort(() => 0.5 - Math.random()).slice(0, num);
            userAnswers = {}; skipStatus = {}; bookmarkStatus = {}; isSubmitted = false; totalSeconds = 0;
            
            localStorage.setItem('hcvs_has_active_quiz', 'true');
            localStorage.setItem('hcvs_current_set', JSON.stringify(currentQuizSet));
            localStorage.setItem('hcvs_bookmarks', JSON.stringify(bookmarkStatus));
            localStorage.removeItem('hcvs_is_submitted');

            document.getElementById('setup-screen').style.display = 'none';
            currentIndex = 0; renderGrid(); showQuestion(0); updateStatsCounter(); updateTimerDisplay(); startTimer();
        }

        function resetQuiz() {
            if (!confirm("確定要重置測驗嗎？這將會清空歷史進度與計時器，並返回首頁。")) return;
            clearInterval(timerInterval); isSubmitted = false; userAnswers = {}; skipStatus = {}; totalSeconds = 0;
            
            ['hcvs_has_active_quiz', 'hcvs_current_set', 'hcvs_answers', 'hcvs_skips', 'hcvs_bookmarks', 'hcvs_last_index', 'hcvs_timer_seconds', 'hcvs_is_submitted'].forEach(key => localStorage.removeItem(key));
            
            document.getElementById('custom-num').value = '';
            document.getElementById('setup-screen').style.display = 'flex';
        }

        function toggleTheme() {
            let html = document.documentElement;
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme'); localStorage.setItem('hcvs_theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark'); localStorage.setItem('hcvs_theme', 'dark');
            }
        }

        function renderGrid() {
            const grid = document.getElementById('number-grid');
            grid.innerHTML = '';
            currentQuizSet.forEach((q, index) => {
                let item = document.createElement('div');
                item.className = 'grid-item'; item.id = "grid-item-" + index;
                item.innerHTML = (index + 1) + "<span class='bookmark-star'>★</span>";
                item.onclick = () => changeQuestion(index); 
                grid.appendChild(item);
            });
        }

        function changeQuestion(targetIndex) {
            if (targetIndex < 0 || targetIndex >= currentQuizSet.length) return;
            if (!isSubmitted) {
                if (userAnswers[currentIndex] === undefined) skipStatus[currentIndex] = true;
                else delete skipStatus[currentIndex];
                localStorage.setItem('hcvs_skips', JSON.stringify(skipStatus));
            }
            showQuestion(targetIndex);
        }

        function showQuestion(index) {
            currentIndex = index;
            localStorage.setItem('hcvs_last_index', currentIndex);

            const qData = currentQuizSet[currentIndex];
            let originalId = qData.q.match(/^\d+/)[0];
            let pureQText = qData.q.replace(/^\d+\.\s*/, '');
            
            document.getElementById('q-number').innerText = "第 " + (index + 1) + " 題 · 原題庫第 " + originalId + " 題 · " + (index + 1) + " / " + currentQuizSet.length;
            document.getElementById('q-text').innerText = pureQText;
            
            const optionsDiv = document.getElementById('q-options');
            optionsDiv.innerHTML = '';
            const letters = ['A','B','C','D','E'];

            qData.options.forEach((opt, optIdx) => {
                let label = document.createElement('label');
                label.className = 'opt-label';

                let radio = document.createElement('input');
                radio.type = 'radio'; radio.name = 'q-opt'; radio.value = optIdx;
                if (userAnswers[currentIndex] === optIdx) radio.checked = true;
                if (isSubmitted) radio.disabled = true;

                radio.onchange = function() {
                    userAnswers[currentIndex] = parseInt(this.value);
                    delete skipStatus[currentIndex]; 
                    localStorage.setItem('hcvs_answers', JSON.stringify(userAnswers));
                    localStorage.setItem('hcvs_skips', JSON.stringify(skipStatus));
                    updateStatsCounter(); updateGridStatus();
                };

                let letterSpan = document.createElement('span');
                letterSpan.className = 'opt-letter';
                letterSpan.innerText = letters[optIdx] || String(optIdx+1);

                let bodySpan = document.createElement('span');
                bodySpan.className = 'opt-body';
                bodySpan.innerText = opt.replace(/^(\([A-Za-z]\)|[A-Za-z]\.)\s*/, '');

                label.appendChild(radio);
                label.appendChild(letterSpan);
                label.appendChild(bodySpan);
                optionsDiv.appendChild(label);

                if (isSubmitted) {
                    if (optIdx === qData.ans) label.classList.add('correct');
                    else if (userAnswers[currentIndex] === optIdx && optIdx !== qData.ans) label.classList.add('wrong');
                }
            });

            const feedback = document.getElementById('feedback-box');
            if (isSubmitted) {
                feedback.style.display = 'block';
                if (userAnswers[currentIndex] === qData.ans) {
                    feedback.className = "result-box correct-box";
                    feedback.innerText = "答對了！";
                } else {
                    feedback.className = "result-box wrong-box";
                    let correctOpt = qData.options[qData.ans] ? qData.options[qData.ans].replace(/^(\([A-Za-z]\)|[A-Za-z]\.)\s*/, '') : "未知選項";
                    feedback.innerHTML = "答錯了！<br>正確答案是：<strong>(" + (letters[qData.ans] || qData.ans) + ") " + correctOpt + "</strong>";
                }
            } else {
                feedback.style.display = 'none';
            }
            updateGridStatus();
        }

        function reportError() {
            const qData = currentQuizSet[currentIndex];
            if (!qData) return;
            let originalId = qData.q.match(/^\d+/)[0];
            let pureQText = qData.q.replace(/^\d+\.\s*/, '');
            let reason = prompt("即將回報【原題庫第 " + originalId + " 題】\n\n題目預覽：" + pureQText.substring(0, 20) + "...\n\n請輸入錯誤原因 (確定後自動於背景送出)：");
            
            if (reason !== null && reason.trim() !== "") {
                document.getElementById('entry_id').value = "第 " + originalId + " 題";
                document.getElementById('entry_reason').value = reason;
                window.submitted = true; document.getElementById('gform').submit();
            }
        }

        function updateStatsCounter() {
            let answeredCount = Object.keys(userAnswers).length;
            let totalCount = currentQuizSet.length;
            document.getElementById('stats-counter').innerHTML = 
                "<span class='stat-line'>目前已答：" + answeredCount + " 題</span>" +
                "<span class='desktop-slash'> / </span>" +
                "<span class='stat-line'>總共：" + totalCount + " 題</span>";
        }

        function updateGridStatus() {
            currentQuizSet.forEach((q, index) => {
                let item = document.getElementById("grid-item-" + index);
                if (!item) return;
                
                item.classList.remove('answered', 'skipped', 'bookmarked', 'panel-correct', 'panel-wrong', 'panel-unanswered', 'active');
                if (bookmarkStatus[index]) item.classList.add('bookmarked');

                if (isSubmitted) {
                    if (userAnswers[index] === undefined) item.classList.add('panel-unanswered'); 
                    else if (userAnswers[index] === q.ans) item.classList.add('panel-correct');    
                    else item.classList.add('panel-wrong');      
                } else {
                    if (userAnswers[index] !== undefined) item.classList.add('answered'); 
                    else if (skipStatus[index]) item.classList.add('skipped');  
                }
                
                if (index === currentIndex) item.classList.add('active');
            });
        }

        function toggleBookmarkCurrent() {
            bookmarkStatus[currentIndex] = !bookmarkStatus[currentIndex];
            localStorage.setItem('hcvs_bookmarks', JSON.stringify(bookmarkStatus)); 
            updateGridStatus();
        }

        function submitQuiz() {
            if(isSubmitted) return;
            let unansweredCount = currentQuizSet.length - Object.keys(userAnswers).length;
            if (unansweredCount > 0) {
                if(!confirm("還有 " + unansweredCount + " 題尚未作答，確定要提早交卷嗎？")) return;
            } else {
                if(!confirm("確定要交卷結算分數嗎？")) return;
            }

            clearInterval(timerInterval); isSubmitted = true; localStorage.setItem('hcvs_is_submitted', 'true'); 
            
            let score = 0;
            currentQuizSet.forEach((q, index) => { if (userAnswers[index] === q.ans) score++; });
            let finalPercent = Math.round((score / currentQuizSet.length) * 100);
            
            alert("測驗結算完成！\n\n得分：" + finalPercent + " 分\n答對題數：" + score + " / " + currentQuizSet.length + " 題\n總共耗時：" + Math.floor(totalSeconds / 60) + " 分 " + (totalSeconds % 60) + " 秒");
            showQuestion(0); 
        }
    </script>
</body>
</html>
